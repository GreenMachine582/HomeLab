---
# services.yml — service repo registry for deploy-service
#
# Each entry maps a repo name to its deployment configuration.
# deploy-service reads this file (default: /opt/homelab/services.yml) and uses
# it to clone/pull the service repo, inject secrets from Infisical, and run
# the appropriate deploy mechanism.
#
# Schema reference: repo_split_breif.md §6.2
# deploy-service CLI: deploy-service/deploy_service/cli.py

repos:
  homelab-edge-services:
    repo: github.com/GreenMachine582/homelab-edge-services
    ref: master
    path: /srv/services/homelab-edge-services
    target_node: homelab-edge
    deployment:
      type: compose
    deploy:
      compose_files: [docker-compose.yml]
      # MUST be rolling — cloudflared is the Cloudflare Tunnel (remote access
      # lifeline). deploy-service enforces `up -d --remove-orphans` and never
      # calls `docker compose down` for this stack.
      strategy: rolling
      # Pi-hole v6 ignores WEBPASSWORD env var; the post-deploy script sets
      # the password via `pihole setpassword` after compose up.
      post_hook: [scripts/post-deploy.sh]
    secrets:
      infisical:
        # deploy-service reads /home/homelab/.infisical_runtime_auth.yml,
        # authenticates with Infisical at http://localhost:8222, fetches each
        # path, and injects the result as the named env var into docker compose.
        # Secrets are never written to disk or the service repo checkout.
        - path: /prod/cloudflare/TUNNEL_TOKEN
          env: TUNNEL_TOKEN
        - path: /prod/pihole/WEB_PASSWORD
          env: PIHOLE_WEB_PASSWORD
        - path: /prod/network/IP_OBSERVE
          env: IP_OBSERVE
        - path: /prod/network/IP_SVC_01
          env: IP_SVC_01
        - path: /prod/network/IP_SVC_02
          env: IP_SVC_02
        - path: /prod/network/IP_SVC_03
          env: IP_SVC_03
        - path: /prod/network/TAILNET
          env: TAILNET
    rollback:
      strategy: git
    services: [cloudflared, caddy, pihole, pihole-exporter, portainer-agent]

  homelab-observe-services:
    repo: github.com/GreenMachine582/homelab-observe-services
    ref: master
    path: /srv/services/homelab-observe-services
    target_node: homelab-observe
    deployment:
      type: compose
    deploy:
      compose_files: [docker-compose.yml]
      # prometheus.yml/alertmanager.yml/monitors.yml are mounted config files,
      # not read by docker compose itself, so ${IP_*}/${DISCORD_WEBHOOK_*}
      # placeholders in them need envsubst before `docker compose up` — see
      # scripts/predeploy.sh.
      pre_hook: [scripts/predeploy.sh]
      post_hook: [scripts/setup_monitors.sh]
    secrets:
      infisical:
        - path: /prod/deploy/GITHUB_PAT
          env: GITHUB_PAT
        - path: /prod/network/IP_EDGE
          env: IP_EDGE
        - path: /prod/network/IP_OBSERVE
          env: IP_OBSERVE
        - path: /prod/network/IP_SVC_01
          env: IP_SVC_01
        - path: /prod/network/IP_SVC_02
          env: IP_SVC_02
        - path: /prod/network/IP_SVC_03
          env: IP_SVC_03
        - path: /prod/grafana/ADMIN_PASSWORD
          env: GRAFANA_ADMIN_PASSWORD
        - path: /prod/discord/WEBHOOK_CRITICAL
          env: DISCORD_WEBHOOK_CRITICAL
        - path: /prod/discord/WEBHOOK_WARNING
          env: DISCORD_WEBHOOK_WARNING
        - path: /prod/discord/WEBHOOK_INFO
          env: DISCORD_WEBHOOK_INFO
        - path: /prod/uptime_kuma/ADMIN_USER
          env: UPTIME_KUMA_ADMIN_USER
        - path: /prod/uptime_kuma/ADMIN_PASSWORD
          env: UPTIME_KUMA_ADMIN_PASSWORD
    rollback:
      strategy: git
    services: [prometheus, loki, grafana, alertmanager, ntfy, uptime-kuma, portainer]

  camunda-platform:
    repo: github.com/GreenMachine582/camunda-platform
    ref: master
    path: /srv/services/camunda-platform
    target_node: homelab-svc-01
    deployment:
      type: compose
    deploy:
      compose_files: [docker-compose.yml]
      strategy: rolling
      # Creates the ES bind-mount dir and sets vm.max_map_count (Elasticsearch
      # requirement) before compose up.
      pre_hook: [scripts/predeploy.sh]
    secrets:
      infisical:
        - path: /prod/camunda/ADMIN_USER
          env: CAMUNDA_ADMIN_USER
        - path: /prod/camunda/ADMIN_PASSWORD
          env: CAMUNDA_ADMIN_PASSWORD
        - path: /prod/camunda/LICENSE_KEY
          env: CAMUNDA_LICENSE_KEY
    rollback:
      strategy: git
    services: [camunda-orchestration, elasticsearch]

  n8n-automation:
    repo: github.com/GreenMachine582/n8n-automation
    ref: master
    path: /srv/services/n8n-automation
    target_node: homelab-svc-01
    deployment:
      type: compose
    deploy:
      compose_files: [docker-compose.yml]
      strategy: rolling
    secrets:
      infisical:
        - path: /prod/n8n/USER
          env: N8N_USER
        - path: /prod/n8n/PASSWORD
          env: N8N_PASSWORD
        - path: /prod/n8n/OWNER_EMAIL
          env: N8N_OWNER_EMAIL
        - path: /prod/n8n/OWNER_PASSWORD
          env: N8N_OWNER_PASSWORD
        - path: /prod/n8n/ENCRYPTION_KEY
          env: N8N_ENCRYPTION_KEY
    rollback:
      strategy: git
    services: [n8n]
