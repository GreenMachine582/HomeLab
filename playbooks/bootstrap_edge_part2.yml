---
# playbooks/bootstrap_edge_part2.yml
#
# Phase 1, Part 2 of 2 — Run from your PC after completing the manual
# Infisical first-run setup (BOOTSTRAP.md "First-run Infisical Setup"
# steps 1-5: org + admin account, the "homelab" project, the "production"
# environment, the nine secret folders, and the bootstrap [write] + runtime
# [read-only] machine identities — their credentials written into vault.yml
# as vault_infisical_bootstrap_client_*/vault_infisical_runtime_client_*).
#
# Seeds Infisical with application secrets from the WSL-local vault.yml
# (additive, create-if-absent), then brings up Semaphore — which needs the
# runtime identity's credentials to resolve its own Ansible secrets from
# Infisical.
#
# Usage:
#   ansible-playbook -i inventories/bootstrap.ini playbooks/bootstrap_edge_part2.yml
#
# Requires: roles/semaphore (+ roles/infisical/tasks/seed.yml, included directly —
#           see the "Infisical | Load role defaults" pre_task for why)
# See: BOOTSTRAP.md § Phase 1 § "First-run Infisical Setup"

- name: "Bootstrap | Edge | Infisical seed and Semaphore"
  hosts: edge_bootstrap
  become: true
  gather_facts: true

  vars:
    play_description: >
      Part 2 of the homelab-edge bootstrap — run once the manual Infisical
      first-run setup is complete. Seeds application secrets into Infisical
      and brings Semaphore online. Safe to re-run (additive seed; Semaphore
      bring-up is idempotent).

  pre_tasks:
    - name: "Preflight | Check required local files exist"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: _required_files
      loop:
        - "{{ playbook_dir }}/../.vault_pass"
        - "{{ playbook_dir }}/../inventories/group_vars/all/vault.yml"
        - "{{ playbook_dir }}/../inventories/group_vars/all/overrides.yml"
      delegate_to: localhost
      become: false

    - name: "Preflight | Abort if any required file is missing"
      ansible.builtin.fail:
        msg: "Required file missing: {{ item.item | basename }} — see BOOTSTRAP.md"
      when: not item.stat.exists
      loop: "{{ _required_files.results }}"
      loop_control:
        label: "{{ item.item | basename }}"
      delegate_to: localhost
      become: false

    - name: "Preflight | Assert required variables are defined"
      ansible.builtin.assert:
        that:
          - vault_infisical_bootstrap_client_id is defined
          - vault_infisical_bootstrap_client_secret is defined
          - vault_infisical_runtime_client_id is defined
          - vault_infisical_runtime_client_secret is defined
          - vault_semaphore_admin_user is defined
          - vault_semaphore_admin_password is defined
        fail_msg: >-
          Required variable undefined — check vault.yml. If you haven't yet
          completed the manual Infisical first-run setup (BOOTSTRAP.md
          "First-run Infisical Setup" steps 1-5), do that first: these
          vault_infisical_bootstrap_client_*/vault_semaphore_admin_* values
          come from the org/project/identities you create there.
      delegate_to: localhost
      become: false

    - name: "Meta | Show play description"
      ansible.builtin.debug:
        msg: "{{ play_description }}"

    - name: "Meta | Confirm target"
      ansible.builtin.debug:
        msg: "Continuing bootstrap of {{ inventory_hostname }} ({{ ansible_host }})"

    # roles/infisical/tasks/seed.yml references infisical_seed_project_slug and
    # infisical_seed_environment from roles/infisical/defaults/main.yml. In Part 1
    # those land in scope because `include_role: name: infisical` runs earlier in
    # the SAME play — Part 2 doesn't (and shouldn't: it has nothing left to render),
    # so load the role's defaults directly. Single source of truth stays the role.
    - name: "Infisical | Load role defaults (project/environment slugs the seed needs)"
      ansible.builtin.include_vars:
        file: "{{ playbook_dir }}/../roles/infisical/defaults/main.yml"
      tags: [infisical, seed]

    # Part 1's "Firewall | Configure and enable" already locked :8222 to the
    # Tailscale CGNAT range — ansible_host (the edge's LAN IP) can no longer reach
    # it. Route the seed over Tailscale instead, consistent with the Tailscale
    # connectivity BOOTSTRAP.md already requires before First-run Infisical Setup.
    - name: "Tailscale | Get edge node's Tailscale IPv4 (LAN access to :8222 is now firewalled)"
      ansible.builtin.command: tailscale ip -4
      register: _edge_tailscale_ip
      changed_when: false
      tags: [infisical, seed]

  tasks:
    - name: "Infisical | Seed application secrets from the WSL vault.yml (additive, create-if-absent)"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/infisical/tasks/seed.yml"
      vars:
        infisical_api_url: "http://{{ _edge_tailscale_ip.stdout }}:8222/api"
      tags: [infisical, seed]

    - name: "Semaphore | Render operational .env (node-generated + vault-seeded secrets)"
      ansible.builtin.include_role:
        name: semaphore
      tags: [semaphore]

    - name: "Docker | Bring up Semaphore (db, app)"
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.edge.yml up -d semaphore-db semaphore
        chdir: "{{ homelab_repo_path }}"
      become_user: homelab
      changed_when: true
      tags: [semaphore]

  post_tasks:
    - name: "Meta | Phase 1 complete"
      ansible.builtin.debug:
        msg: >
          homelab-edge Phase 1 complete — Infisical is seeded with application
          secrets and Semaphore is up
          (http://{{ _edge_tailscale_ip.stdout }}:3010 — Tailscale-only, like
          Infisical). Now revoke the bootstrap machine identity (Infisical UI ->
          Access Control -> Identities -> bootstrap -> disable/delete — it has
          write access to every secret and has no further use; see BOOTSTRAP.md
          "First-run Infisical Setup" step 8), then run Phase 2:
            ansible-playbook playbooks/deploy_edge.yml --limit homelab-edge
          from the edge as 'homelab', or directly from your PC/WSL — see
          BOOTSTRAP.md "Phase 2: Edge -> Self-Deploy".
