---
# playbooks/bootstrap_edge.yml
#
# Phase 1 — Run from your PC against a fresh homelab-edge OS install.
# Converts the node into the Ansible control node for the entire homelab.
#
# Usage:
#   ansible-playbook -i inventories/bootstrap.ini playbooks/bootstrap_edge.yml \
#     --ask-become-pass
#
# Requires: roles/users, roles/base_hardening, roles/docker, roles/tailscale, roles/firewall
# See: BOOTSTRAP.md § Phase 1

- name: "Bootstrap | Edge | Base system, users, and access"
  hosts: edge_bootstrap
  become: true
  gather_facts: true

  vars:
    play_description: >
      One-time bootstrap of homelab-edge from a fresh OS install.
      Creates system users, installs Docker and Ansible, clones the repo,
      hardens SSH, and configures the firewall. Safe to re-run.

  pre_tasks:
    - name: "Preflight | Check required local files exist"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: _required_files
      loop:
        - "{{ playbook_dir }}/../.ssh/homelab-github"
        - "{{ playbook_dir }}/../.ssh/homelab"
        - "{{ playbook_dir }}/../.ssh/homelab.pub"
        - "{{ playbook_dir }}/../.vault_pass"
        - "{{ playbook_dir }}/../inventories/group_vars/all/vault.yml"
        - "{{ playbook_dir }}/../inventories/group_vars/all/local.yml"
      delegate_to: localhost
      become: false

    - name: "Preflight | Abort if any required file is missing"
      ansible.builtin.fail:
        msg: "Required file missing: {{ item.item | basename }} — see BOOTSTRAP.md"
      when: not item.stat.exists
      loop: "{{ _required_files.results }}"
      loop_control:
        label: "{{ item.item | basename }}"
      delegate_to: localhost
      become: false

    - name: "Preflight | Assert required variables are defined"
      ansible.builtin.assert:
        that:
          - ssh_port is defined
          - vault_github_org is defined
          - homelab_repo_path is defined
          - homelab_repo_branch is defined
          - lan_subnet is defined
        fail_msg: "Required variable undefined — check group_vars/all/main.yml, vault.yml and local.yml"
      delegate_to: localhost
      become: false

    - name: "Meta | Show play description"
      ansible.builtin.debug:
        msg: "{{ play_description }}"

    - name: "Meta | Confirm target"
      ansible.builtin.debug:
        msg: "Bootstrapping {{ inventory_hostname }} ({{ ansible_host }})"

    - name: "System | Set hostname"
      ansible.builtin.hostname:
        name: homelab-edge

    - name: "System | Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "System | Install base packages"
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: present

  roles:
    - role: users
      tags: [base, users]

    - role: base_hardening
      tags: [base, hardening]

    - role: docker
      tags: [docker]

    - role: tailscale
      tags: [tailscale]
      vars:
        tailscale_up: false   # Tailscale started in Phase 2 (deploy_edge.yml)

  tasks:
    - name: "Ansible | Install Ansible on edge (control node)"
      ansible.builtin.apt:
        name:
          - ansible
          - python3-pip
        state: present
      tags: [ansible]

    - name: "Repo | Ensure /opt/homelab exists with correct ownership"
      ansible.builtin.file:
        path: "{{ homelab_repo_path }}"
        state: directory
        owner: homelab
        group: homelab
        mode: "0755"
      tags: [repo]

    - name: "Repo | Ensure homelab .ssh dir exists"
      ansible.builtin.file:
        path: /home/homelab/.ssh
        state: directory
        owner: homelab
        group: homelab
        mode: "0700"
      tags: [repo]

    - name: "Ansible | Scan own SSH host keys"
      ansible.builtin.shell:
        cmd: ssh-keyscan -p {{ ssh_port }} {{ ansible_host }} 2>/dev/null
      register: _own_host_keys
      changed_when: false
      tags: [ansible]

    - name: "Ansible | Add own host keys to homelab known_hosts"
      ansible.builtin.known_hosts:
        name: "[{{ ansible_host }}]:{{ ssh_port }}"
        key: "{{ item }}"
        path: /home/homelab/.ssh/known_hosts
        state: present
      loop: "{{ _own_host_keys.stdout_lines | select('match', '^[^#]') | list }}"
      tags: [ansible]

    - name: "Repo | Deploy GitHub deploy key"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.ssh/homelab-github"
        dest: /home/homelab/.ssh/github
        owner: homelab
        group: homelab
        mode: "0600"
      tags: [repo]

    - name: "Repo | Clone homelab repo"
      ansible.builtin.git:
        repo: "git@github.com:{{ vault_github_org }}/homelab.git"
        dest: "{{ homelab_repo_path }}"
        version: "{{ homelab_repo_branch }}"
        accept_hostkey: true
        key_file: /home/homelab/.ssh/github
      become_user: homelab
      tags: [repo]

    - name: "Secrets | Copy vault password file"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.vault_pass"
        dest: "{{ homelab_repo_path }}/.vault_pass"
        owner: homelab
        group: homelab
        mode: "0600"
      tags: [secrets]

    - name: "Secrets | Copy Ansible Vault"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../inventories/group_vars/all/vault.yml"
        dest: "{{ homelab_repo_path }}/inventories/group_vars/all/vault.yml"
        owner: homelab
        group: homelab
        mode: "0600"
      tags: [secrets]

    - name: "Secrets | Copy local network variables"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../inventories/group_vars/all/local.yml"
        dest: "{{ homelab_repo_path }}/inventories/group_vars/all/local.yml"
        owner: homelab
        group: homelab
        mode: "0644"
      tags: [secrets]

    - name: "Secrets | Copy homelab SSH private key"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.ssh/homelab"
        dest: /home/homelab/.ssh/homelab
        owner: homelab
        group: homelab
        mode: "0600"
      tags: [secrets]

    - name: "Secrets | Copy homelab SSH public key"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.ssh/homelab.pub"
        dest: /home/homelab/.ssh/homelab.pub
        owner: homelab
        group: homelab
        mode: "0644"
      tags: [secrets]

    - name: "Repo | Set repo ownership"
      ansible.builtin.file:
        path: "{{ homelab_repo_path }}"
        owner: homelab
        group: homelab
        recurse: true
      tags: [repo]

    - name: "Firewall | Configure and enable"
      ansible.builtin.include_role:
        name: firewall
      vars:
        firewall_rules:
          - { port: 53, proto: udp, src: "{{ lan_subnet }}", comment: "Pi-hole DNS UDP (LAN only)" }
          - { port: 53, proto: tcp, src: "{{ lan_subnet }}", comment: "Pi-hole DNS TCP (LAN only)" }
      tags: [firewall]

  post_tasks:
    - name: "Meta | Bootstrap complete"
      ansible.builtin.debug:
        msg: >
          homelab-edge bootstrap complete.
          SSH to the node as 'homelab' and run Phase 2:
          ansible-playbook -i inventories/prod.yml playbooks/deploy_edge.yml
          --limit homelab-edge