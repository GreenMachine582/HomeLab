---
# playbooks/bootstrap_edge.yml
#
# Phase 1 — Run from your PC against a fresh homelab-edge OS install. Converts
# the node into the Ansible control node for the homelab, hardens it, brings
# Infisical online and fully provisions AND seeds it via its REST API — org,
# admin, "homelab" project, "production" environment, the nine secret folders,
# the read-only "runtime" machine identity, and every application secret from
# vault.yml (see roles/infisical/tasks/bootstrap_instance.yml) — configures
# the firewall, then brings Semaphore online (it reads its own read-only
# Infisical runtime credentials straight from the node-local file
# bootstrap_instance.yml just wrote). One pass, zero manual UI steps, zero
# copy-paste, nothing printed for you to transcribe anywhere — see the final
# debug message for what's next (Phase 2).
#
# Usage:
#   ansible-playbook -i inventories/bootstrap.ini playbooks/bootstrap_edge.yml
#
# Requires: roles/users, roles/base_hardening, roles/docker, roles/tailscale,
#           roles/infisical, roles/firewall, roles/semaphore
# Then:     ansible-playbook playbooks/deploy_edge.yml --limit homelab-edge
#           (Phase 2 — see BOOTSTRAP.md § "Phase 2: Edge -> Self-Deploy")
# See: BOOTSTRAP.md § Phase 1

# ── Probe play ─────────────────────────────────────────────────────────────────
# Runs on localhost (no SSH connection yet). Loads ip_edge, ssh_port, and
# tailscale_ip_edge from overrides.yml, probes up to four (host, port) candidates
# in "most-configured first" order, and injects the winning ansible_host /
# ansible_port into homelab-edge via add_host. The static vars (ansible_user,
# key path, python interpreter, become password) stay in bootstrap.ini and merge
# from inventory as normal — only host and port change per-run.
#
# Candidate order (first reachable wins):
#   1. Tailscale IP + ssh_port   — fully provisioned; fast path on re-runs
#   2. LAN IP + ssh_port         — hardened SSH, Tailscale not yet on this path
#   3. Tailscale IP + fallback_ssh_port — omitted when ssh_port == fallback_ssh_port
#   4. LAN IP + fallback_ssh_port       — fresh OS install; omitted when ssh_port == fallback_ssh_port
# Tailscale candidates are skipped when tailscale_ip_edge is EDIT_BEFORE_USE.
#
# Note: vars_files loads main.yml which contains vault refs (e.g. {{ vault_ntfy_token }}).
# Those are stored as unevaluated strings and never resolved here — the probe play
# only touches ip_edge, ssh_port, fallback_ssh_port, tailscale_ip_edge, so no vault password is needed.
- name: "Probe | Discover reachable SSH endpoint for homelab-edge"
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - "{{ playbook_dir }}/../inventories/group_vars/all/main.yml"
    - "{{ playbook_dir }}/../inventories/group_vars/all/overrides.yml"

  vars:
    _tailscale_available: >-
      {{ tailscale_ip_edge is defined
         and tailscale_ip_edge | string != 'EDIT_BEFORE_USE' }}
    _has_custom_port: "{{ ssh_port | int != fallback_ssh_port | int }}"
    _ssh_candidates: >-
      {{
        ([{'host': tailscale_ip_edge, 'port': ssh_port | int,
           'label': 'Tailscale ' ~ tailscale_ip_edge ~ ':' ~ ssh_port}]
         if _tailscale_available else [])
        + [{'host': ip_edge, 'port': ssh_port | int,
            'label': 'LAN ' ~ ip_edge ~ ':' ~ ssh_port}]
        + ([{'host': tailscale_ip_edge, 'port': fallback_ssh_port | int,
             'label': 'Tailscale ' ~ tailscale_ip_edge ~ ':' ~ fallback_ssh_port}]
           if _tailscale_available and _has_custom_port else [])
        + ([{'host': ip_edge, 'port': fallback_ssh_port | int,
             'label': 'LAN ' ~ ip_edge ~ ':' ~ fallback_ssh_port}]
           if _has_custom_port else [])
      }}

  tasks:
    - name: "Probe | Assert ip_edge is set in overrides.yml"
      ansible.builtin.assert:
        that: ip_edge | string != 'EDIT_BEFORE_USE'
        fail_msg: >-
          ip_edge is still EDIT_BEFORE_USE. Set it in overrides.yml
          (the Pi's current LAN IP) then re-run. See BOOTSTRAP.md § 1.3.
      tags: [always]

    - name: "Probe | Show candidates"
      ansible.builtin.debug:
        msg: "Probing: {{ _ssh_candidates | map(attribute='label') | list | join(' → ') }}"
      tags: [always]

    - name: "Probe | Test TCP reachability"
      ansible.builtin.wait_for:
        host: "{{ item.host }}"
        port: "{{ item.port }}"
        state: started
        timeout: 5
      register: _probe_results
      ignore_errors: true
      changed_when: false
      loop: "{{ _ssh_candidates }}"
      loop_control:
        label: "{{ item.label }}"
      tags: [always]

    - name: "Probe | Collect successes"
      ansible.builtin.set_fact:
        _successful_probes: >-
          {{ _probe_results.results | selectattr('failed', 'equalto', false) | list }}
      tags: [always]

    - name: "Probe | Fail if nothing reachable"
      ansible.builtin.fail:
        msg: >-
          No SSH endpoint reachable for homelab-edge.
          Tried: {{ _ssh_candidates | map(attribute='label') | list | join(', ') }}.
          Check the node is powered on, ip_edge is correct in overrides.yml,
          and the network is reachable. See BOOTSTRAP.md § 1.3.
      when: _successful_probes | length == 0
      tags: [always]

    - name: "Probe | Show winner"
      ansible.builtin.debug:
        msg: "Connecting via: {{ _successful_probes[0].item.label }}"
      tags: [always]

    - name: "Probe | Inject ansible_host and ansible_port"
      ansible.builtin.add_host:
        name: homelab-edge
        groups: edge_bootstrap
        ansible_host: "{{ _successful_probes[0].item.host }}"
        ansible_port: "{{ _successful_probes[0].item.port }}"
      changed_when: false
      tags: [always]

- name: "Bootstrap | Edge | Base system, users, and access"
  hosts: edge_bootstrap
  become: true
  gather_facts: true

  vars:
    play_description: >
      The complete homelab-edge bootstrap, in one pass. Creates system users,
      installs Docker and Ansible, clones the repo, hardens SSH, brings
      Infisical online and fully provisions AND seeds it via its REST API
      (org, admin, project, environment, folders, the read-only runtime
      identity, and every application secret — zero manual UI steps, zero
      copy-paste), configures the firewall, and brings Semaphore online. Safe
      to re-run — see the final debug message for what's next.

  pre_tasks:
    - name: "Preflight | Check required local files exist"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: _required_files
      loop:
        - "{{ playbook_dir }}/../.ssh/homelab-github"
        - "{{ playbook_dir }}/../.ssh/homelab"
        - "{{ playbook_dir }}/../.ssh/homelab.pub"
        - "{{ playbook_dir }}/../.vault_pass"
        - "{{ playbook_dir }}/../inventories/group_vars/all/vault.yml"
        - "{{ playbook_dir }}/../inventories/group_vars/all/overrides.yml"
      delegate_to: localhost
      become: false

    - name: "Preflight | Abort if any required file is missing"
      ansible.builtin.fail:
        msg: "Required file missing: {{ item.item | basename }} — see BOOTSTRAP.md"
      when: not item.stat.exists
      loop: "{{ _required_files.results }}"
      loop_control:
        label: "{{ item.item | basename }}"
      delegate_to: localhost
      become: false

    - name: "Preflight | Assert required variables are defined"
      ansible.builtin.assert:
        that:
          - ssh_port is defined
          - github_org is defined
          - homelab_repo_path is defined
          - homelab_repo_branch is defined
          - lan_subnet is defined
          - vault_infisical_encryption_key is defined
          - vault_infisical_admin_email is defined
          - vault_infisical_admin_password is defined
          - vault_semaphore_admin_user is defined
          - vault_semaphore_admin_password is defined
        fail_msg: >-
          Required variable undefined — check group_vars/all/main.yml, vault.yml and
          overrides.yml. vault_infisical_encryption_key needs a REAL, PERMANENT value
          before this run (see vault.yml.example — a changed key can't decrypt the
          existing Postgres volume once it exists). vault_infisical_admin_email/
          vault_infisical_admin_password are also REAL-value-required (not
          "changeme"): they're the seed credentials the one-shot
          POST /v1/admin/bootstrap call uses to create Infisical's admin account and
          organization (see roles/infisical/tasks/bootstrap_instance.yml) — nothing
          can mint them for you. vault_semaphore_admin_* are yours to set directly
          too (see BOOTSTRAP.md § 1.9 "Create Ansible Vault") — Semaphore now comes
          up at the end of this same play. Notably absent from this list:
          vault_infisical_runtime_client_* never exists in vault.yml at all — that
          identity is created, persisted, and consumed entirely on this node (see
          CLAUDE.md "Secrets" and bootstrap_instance.yml's header for why).
      delegate_to: localhost
      become: false

    - name: "Meta | Show play description"
      ansible.builtin.debug:
        msg: "{{ play_description }}"

    - name: "Meta | Confirm target"
      ansible.builtin.debug:
        msg: "Bootstrapping {{ inventory_hostname }} ({{ ansible_host }})"

    - name: "System | Set hostname"
      ansible.builtin.hostname:
        name: homelab-edge

    - name: "System | Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "System | Install base packages"
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: present

  roles:
    - role: users
      tags: [base, users]

    - role: base_hardening
      tags: [base, hardening]

    - role: docker
      tags: [docker]

    - role: tailscale
      tags: [tailscale]
      vars:
        # Brought up here (not deferred to Phase 2) because Infisical and Semaphore
        # are Tailscale-only services that must be reachable — for the seed task
        # below and for the operator afterwards — by the end of Phase 1.
        tailscale_up: true

  tasks:
    - name: "Ansible | Install Ansible on edge (control node)"
      ansible.builtin.apt:
        name:
          - ansible
          - python3-pip
          - python3-venv
        state: present
      tags: [ansible]

    - name: "Repo | Ensure /opt/homelab exists with correct ownership"
      ansible.builtin.file:
        path: "{{ homelab_repo_path }}"
        state: directory
        owner: homelab
        group: homelab
        mode: "0755"
      tags: [repo]

    - name: "Repo | Ensure homelab .ssh dir exists"
      ansible.builtin.file:
        path: /home/homelab/.ssh
        state: directory
        owner: homelab
        group: homelab
        mode: "0700"
      tags: [repo]

    - name: "Ansible | Scan own SSH host keys"
      ansible.builtin.shell:
        cmd: ssh-keyscan -p {{ ssh_port }} {{ ansible_host }} 2>/dev/null
      register: _own_host_keys
      changed_when: false
      tags: [ansible]

    - name: "Ansible | Add own host keys to homelab known_hosts"
      ansible.builtin.known_hosts:
        name: "[{{ ansible_host }}]:{{ ssh_port }}"
        key: "{{ item }}"
        path: /home/homelab/.ssh/known_hosts
        state: present
      loop: "{{ _own_host_keys.stdout_lines | select('match', '^[^#]') | list }}"
      no_log: true
      become_user: homelab
      tags: [ansible]

    - name: "Repo | Deploy GitHub deploy key"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.ssh/homelab-github"
        dest: /home/homelab/.ssh/github
        owner: homelab
        group: homelab
        mode: "0600"
      tags: [repo]

    - name: "Repo | Write SSH config for GitHub deploy key"
      ansible.builtin.blockinfile:
        path: /home/homelab/.ssh/config
        create: true
        owner: homelab
        group: homelab
        mode: "0600"
        marker: "# {mark} github.com deploy key"
        block: |
          Host github.com
              IdentityFile ~/.ssh/github
              IdentitiesOnly yes
      tags: [repo]

    - name: "Repo | Scan GitHub host key"
      ansible.builtin.command:
        cmd: ssh-keyscan -t ed25519 github.com
      register: _github_hostkey
      changed_when: false
      delegate_to: localhost
      become: false
      tags: [repo]

    - name: "Repo | Add GitHub to homelab known_hosts"
      ansible.builtin.known_hosts:
        name: github.com
        key: "{{ _github_hostkey.stdout }}"
        path: /home/homelab/.ssh/known_hosts
        state: present
      become_user: homelab
      tags: [repo]

    - name: "Repo | Clone homelab repo"
      ansible.builtin.git:
        repo: "git@github.com:{{ github_org }}/homelab.git"
        dest: "{{ homelab_repo_path }}"
        version: "{{ homelab_repo_branch }}"
        accept_hostkey: false
        key_file: /home/homelab/.ssh/github
      become_user: homelab
      tags: [repo]

    # NOTE — vault.yml and .vault_pass are deliberately NOT copied here.
    # vault.yml lives ONLY on the WSL control host (this machine) — see CLAUDE.md
    # "Secrets". Phase 2+ playbooks running on the edge resolve their application
    # secrets from Infisical at runtime instead (roles/infisical/tasks/lookup.yml
    # — see deploy_edge.yml's "Secrets" pre_tasks). The only WSL→node secret
    # crossing left at all is the one-time additive seed of application secrets
    # into Infisical, which happens entirely inside "Infisical | Bootstrap
    # instance" below — decrypted vault.yml values cross the wire to Infisical's
    # API (authenticated with the one-shot bootstrap call's own instance-admin
    # token; nothing is delegated back to localhost, see that task's header), but
    # the file itself never does. The runtime identity's credentials never touch
    # vault.yml at all: bootstrap_instance.yml mints them fresh, on this node,
    # and writes them straight to /home/homelab/.infisical_runtime_auth.yml —
    # which Semaphore (brought up later in this same play) also reads directly.
    # See bootstrap_instance.yml's header for the full "no persisted bootstrap
    # identity, no round-trip through vault.yml" rationale.

    - name: "Secrets | Copy local network variables"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../inventories/group_vars/all/overrides.yml"
        dest: "{{ homelab_repo_path }}/inventories/group_vars/all/overrides.yml"
        owner: homelab
        group: homelab
        mode: "0644"
      tags: [secrets]

    - name: "Secrets | Copy homelab SSH private key"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.ssh/homelab"
        dest: /home/homelab/.ssh/homelab
        owner: homelab
        group: homelab
        mode: "0600"
      tags: [secrets]

    - name: "Secrets | Copy homelab SSH public key"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.ssh/homelab.pub"
        dest: /home/homelab/.ssh/homelab.pub
        owner: homelab
        group: homelab
        mode: "0644"
      tags: [secrets]

    - name: "Repo | Set repo ownership"
      ansible.builtin.file:
        path: "{{ homelab_repo_path }}"
        owner: homelab
        group: homelab
        recurse: true
      tags: [repo]

    # ── Infisical ────────────────────────────────────────────────────────────
    # Brought up here rather than left to deploy_edge.yml's full-stack
    # `docker compose up`: Phase 2+ playbooks need Infisical live and reachable
    # from their very first run — deploy_edge.yml resolves its own application
    # secrets from it (roles/infisical/tasks/lookup.yml). Brought up individually
    # (not the whole edge stack) so cloudflared/Caddy/Pi-hole still come up under
    # deploy_edge.yml's control, as before.
    #
    # Provisioning (org, admin, project, environment, folders, the read-only
    # "runtime" identity), seeding every application secret from vault.yml, AND
    # writing the runtime identity's credentials straight to a node-local file
    # for Semaphore and Phase 2+ Ansible runs to read — all of it happens in one
    # shot, immediately below (roles/infisical/tasks/bootstrap_instance.yml), via
    # Infisical's one-shot POST /v1/admin/bootstrap API and the instance-admin
    # token it returns. See that task's header for the full "why all of this can
    # now happen inline, with no persisted write-capable identity and no
    # checkpoint of any kind" rationale. Nothing waits for a second pass; nothing
    # gets printed for you to copy anywhere.
    - name: "Infisical | Render operational .env (node-generated secrets)"
      ansible.builtin.include_role:
        name: infisical
        public: true   # exposes infisical's role defaults (incl. infisical_runtime_auth_path)
                       # to the rest of THIS play — the later Semaphore include_role needs it
                       # (see roles/semaphore/tasks/main.yml) and is a different role, so it
                       # can't see infisical's defaults without this.
      tags: [infisical]

    # ── Infisical reset (stuck state recovery) ───────────────────────────────
    # Wipes Infisical containers and their named volumes so bootstrap_instance.yml
    # sees a fresh instance (200 on bootstrap) rather than the stuck state (400 +
    # no runtime_auth.yml). ONLY runs when explicitly requested:
    #   ansible-playbook -i inventories/bootstrap.ini playbooks/bootstrap_edge.yml \
    #     --extra-vars infisical_reset=true
    # /opt/infisical/.env is NOT removed — it holds ENCRYPTION_KEY (permanent,
    # from vault_infisical_encryption_key) and the DB/Redis passwords. A fresh
    # Postgres container initialised from those same env vars will have the right
    # credentials. See roles/infisical/tasks/bootstrap_instance.yml for the full
    # stuck-state rationale.
    - name: "Infisical reset | Stop and remove Infisical containers"
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.edge.yml rm -sf infisical infisical-db infisical-redis
        chdir: "{{ homelab_repo_path }}"
      become_user: homelab
      failed_when: false
      changed_when: true
      when: infisical_reset | default(false) | bool
      tags: [infisical]

    - name: "Infisical reset | Remove named DB and Redis volumes"
      ansible.builtin.command:
        cmd: >
          docker volume rm
          {{ homelab_repo_path | basename }}_infisical_db_data
          {{ homelab_repo_path | basename }}_infisical_redis_data
      failed_when: false
      changed_when: true
      when: infisical_reset | default(false) | bool
      tags: [infisical]

    - name: "Infisical reset | Remove stale runtime credentials file"
      ansible.builtin.file:
        path: "{{ infisical_runtime_auth_path }}"
        state: absent
      become: true
      become_user: "{{ infisical_service_user }}"
      when: infisical_reset | default(false) | bool
      tags: [infisical]

    - name: "Docker | Bring up Infisical (db, redis, app)"
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.edge.yml up -d infisical-db infisical-redis infisical
        chdir: "{{ homelab_repo_path }}"
      become_user: homelab
      changed_when: true
      tags: [infisical]

    - name: "Infisical | Wait for the API port to accept connections"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8222
        timeout: 180
      become: false
      tags: [infisical]

    # Port-open ≠ HTTP-ready: on a Pi, Infisical runs DB migrations AFTER
    # binding its port, resetting every connection until migrations finish.
    # Retry until we get any real HTTP response (status != -1), which proves
    # the app is serving — then the bootstrap call below can proceed safely.
    - name: "Infisical | Wait for API to serve HTTP (post-migration readiness)"
      ansible.builtin.uri:
        url: "http://127.0.0.1:8222/api/status"
        method: GET
        timeout: 10
      register: _infisical_api_ready
      until: (_infisical_api_ready.status | default(-1)) != -1
      retries: 60
      delay: 10
      failed_when: false
      become: false
      tags: [infisical]

    # Runs here — pre-firewall — so 127.0.0.1:8222 is reachable directly, with
    # no Tailscale-IP lookup dance: this is the ONLY point in the node's life
    # where its own loopback can reach Infisical's API unauthenticated AND
    # un-firewalled. The instance bootstrap, every identity, and the entire
    # application-secret seed all happen right here, in this one window.
    - name: "Infisical | Bootstrap instance (org, admin, project, environment, folders, runtime identity, application secrets)"
      ansible.builtin.include_role:
        name: infisical
        tasks_from: bootstrap_instance.yml
      vars:
        infisical_api_url: "http://127.0.0.1:8222/api"
      tags: [infisical, bootstrap]

    - name: "Firewall | Configure and enable"
      ansible.builtin.include_role:
        name: firewall
      vars:
        firewall_rules:
          - { port: 53,   proto: udp, src: "{{ lan_subnet }}",          comment: "Pi-hole DNS UDP (LAN only)" }
          - { port: 53,   proto: tcp, src: "{{ lan_subnet }}",          comment: "Pi-hole DNS TCP (LAN only)" }
          - { port: 8222, proto: tcp, src: "{{ tailscale_cgnat_range }}", comment: "Infisical UI/API (Tailscale only)" }
          - { port: 3010, proto: tcp, src: "{{ tailscale_cgnat_range }}", comment: "Semaphore UI (Tailscale only)" }
      tags: [firewall]

    # ── Semaphore ────────────────────────────────────────────────────────────
    # Brought up last, after the firewall — it has nothing time-critical to do
    # earlier, and its .env render needs infisical_runtime_auth_path to already
    # hold real values, which "Infisical | Bootstrap instance" above just wrote
    # moments ago. Reads its own read-only Infisical runtime credentials
    # straight from that same node-local file (roles/semaphore/tasks/main.yml,
    # via include_vars) — never from vault.yml, which never holds them (see
    # CLAUDE.md "Secrets" and bootstrap_instance.yml's header for why).
    - name: "Semaphore | Render operational .env (node-generated + vault-seeded + node-local Infisical runtime creds)"
      ansible.builtin.include_role:
        name: semaphore
      tags: [semaphore]

    - name: "Docker | Bring up Semaphore (db, app)"
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.edge.yml up -d semaphore-db semaphore
        chdir: "{{ homelab_repo_path }}"
      become_user: homelab
      changed_when: true
      tags: [semaphore]

    - name: "Semaphore | Bootstrap project, inventory, key store, and task templates via API"
      ansible.builtin.include_role:
        name: semaphore
        tasks_from: bootstrap_project.yml
      tags: [semaphore]

  post_tasks:
    - name: "Meta | Bootstrap complete"
      ansible.builtin.debug:
        msg: >
          homelab-edge bootstrap complete — one pass, zero manual steps,
          nothing to copy or click anywhere. Base system, users, Docker, and
          Tailscale are up. Infisical is up, fully provisioned (org, admin,
          "homelab" project, "production" environment, nine secret folders,
          and the read-only "runtime" machine identity) AND fully seeded with
          every application secret from vault.yml (see the
          "Infisical bootstrap | Summary" message above for counts). Semaphore
          is up too, already authenticated against Infisical via that same
          runtime identity — read straight from the node-local credentials
          file, never from vault.yml. The Semaphore project is fully
          initialised (key store, repository, prod inventory, environment,
          and task templates) — no setup wizard, no clicking. The firewall
          is configured (ports 8222 and 3010 are Tailscale-only — find the
          edge's tailnet IP via
          `tailscale status` or the admin console, then browse to
          http://<that-ip>:8222 for Infisical and http://<that-ip>:3010 for
          Semaphore). Phase 1 is done. Run Phase 2 next:
            ansible-playbook playbooks/deploy_edge.yml --limit homelab-edge
          from the edge as 'homelab', or directly from your PC/WSL — see
          BOOTSTRAP.md "Phase 2: Edge -> Self-Deploy".