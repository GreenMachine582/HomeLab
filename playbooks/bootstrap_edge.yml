---
# playbooks/bootstrap_edge.yml
#
# Phase 1 — Run from your PC against a fresh homelab-edge OS install.
# Converts the node into the Ansible control node for the entire homelab, then
# hands off to Phase 2 (deploy_edge.yml, run locally on the edge as 'homelab')
# as its final step — one playbook invocation takes a fresh OS install all the
# way to a fully deployed, self-hosting edge node. No separate SSH-and-run-Phase-2
# step required.
#
# Usage:
#   ansible-playbook -i inventories/bootstrap.ini playbooks/bootstrap_edge.yml
#
# Requires: roles/users, roles/base_hardening, roles/docker, roles/tailscale,
#           roles/infisical, roles/semaphore, roles/firewall
# See: BOOTSTRAP.md § Phase 1

- name: "Bootstrap | Edge | Base system, users, and access"
  hosts: edge_bootstrap
  become: true
  gather_facts: true

  vars:
    play_description: >
      One-time bootstrap of homelab-edge from a fresh OS install.
      Creates system users, installs Docker and Ansible, clones the repo,
      hardens SSH, and configures the firewall. Safe to re-run.

  pre_tasks:
    - name: "Preflight | Check required local files exist"
      ansible.builtin.stat:
        path: "{{ item }}"
      register: _required_files
      loop:
        - "{{ playbook_dir }}/../.ssh/homelab-github"
        - "{{ playbook_dir }}/../.ssh/homelab"
        - "{{ playbook_dir }}/../.ssh/homelab.pub"
        - "{{ playbook_dir }}/../.vault_pass"
        - "{{ playbook_dir }}/../inventories/group_vars/all/vault.yml"
        - "{{ playbook_dir }}/../inventories/group_vars/all/overrides.yml"
      delegate_to: localhost
      become: false

    - name: "Preflight | Abort if any required file is missing"
      ansible.builtin.fail:
        msg: "Required file missing: {{ item.item | basename }} — see BOOTSTRAP.md"
      when: not item.stat.exists
      loop: "{{ _required_files.results }}"
      loop_control:
        label: "{{ item.item | basename }}"
      delegate_to: localhost
      become: false

    - name: "Preflight | Assert required variables are defined"
      ansible.builtin.assert:
        that:
          - ssh_port is defined
          - github_org is defined
          - homelab_repo_path is defined
          - homelab_repo_branch is defined
          - lan_subnet is defined
          - vault_infisical_encryption_key is defined
          - vault_infisical_bootstrap_client_id is defined
          - vault_infisical_bootstrap_client_secret is defined
          - vault_infisical_runtime_client_id is defined
          - vault_infisical_runtime_client_secret is defined
          - vault_semaphore_admin_user is defined
          - vault_semaphore_admin_password is defined
        fail_msg: >-
          Required variable undefined — check group_vars/all/main.yml, vault.yml and
          overrides.yml. Infisical/Semaphore now come up during Phase 1, so their
          vault_infisical_*/vault_semaphore_* entries (see vault.yml.example) must
          already be set before bootstrapping.
      delegate_to: localhost
      become: false

    - name: "Meta | Show play description"
      ansible.builtin.debug:
        msg: "{{ play_description }}"

    - name: "Meta | Confirm target"
      ansible.builtin.debug:
        msg: "Bootstrapping {{ inventory_hostname }} ({{ ansible_host }})"

    - name: "System | Set hostname"
      ansible.builtin.hostname:
        name: homelab-edge

    - name: "System | Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "System | Install base packages"
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: present

  roles:
    - role: users
      tags: [base, users]

    - role: base_hardening
      tags: [base, hardening]

    - role: docker
      tags: [docker]

    - role: tailscale
      tags: [tailscale]
      vars:
        # Brought up here (not deferred to Phase 2) because Infisical and Semaphore
        # are Tailscale-only services that must be reachable — for the seed task
        # below and for the operator afterwards — by the end of Phase 1.
        tailscale_up: true

  tasks:
    - name: "Ansible | Install Ansible on edge (control node)"
      ansible.builtin.apt:
        name:
          - ansible
          - python3-pip
        state: present
      tags: [ansible]

    - name: "Repo | Ensure /opt/homelab exists with correct ownership"
      ansible.builtin.file:
        path: "{{ homelab_repo_path }}"
        state: directory
        owner: homelab
        group: homelab
        mode: "0755"
      tags: [repo]

    - name: "Repo | Ensure homelab .ssh dir exists"
      ansible.builtin.file:
        path: /home/homelab/.ssh
        state: directory
        owner: homelab
        group: homelab
        mode: "0700"
      tags: [repo]

    - name: "Ansible | Scan own SSH host keys"
      ansible.builtin.shell:
        cmd: ssh-keyscan -p {{ ssh_port }} {{ ansible_host }} 2>/dev/null
      register: _own_host_keys
      changed_when: false
      tags: [ansible]

    - name: "Ansible | Add own host keys to homelab known_hosts"
      ansible.builtin.known_hosts:
        name: "[{{ ansible_host }}]:{{ ssh_port }}"
        key: "{{ item }}"
        path: /home/homelab/.ssh/known_hosts
        state: present
      loop: "{{ _own_host_keys.stdout_lines | select('match', '^[^#]') | list }}"
      no_log: true
      tags: [ansible]

    - name: "Repo | Deploy GitHub deploy key"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.ssh/homelab-github"
        dest: /home/homelab/.ssh/github
        owner: homelab
        group: homelab
        mode: "0600"
      tags: [repo]

    - name: "Repo | Write SSH config for GitHub deploy key"
      ansible.builtin.blockinfile:
        path: /home/homelab/.ssh/config
        create: true
        owner: homelab
        group: homelab
        mode: "0600"
        marker: "# {mark} github.com deploy key"
        block: |
          Host github.com
              IdentityFile ~/.ssh/github
              IdentitiesOnly yes
      tags: [repo]

    - name: "Repo | Clone homelab repo"
      ansible.builtin.git:
        repo: "git@github.com:{{ github_org }}/homelab.git"
        dest: "{{ homelab_repo_path }}"
        version: "{{ homelab_repo_branch }}"
        accept_hostkey: true
        key_file: /home/homelab/.ssh/github
      become_user: homelab
      tags: [repo]

    # NOTE — vault.yml and .vault_pass are deliberately NOT copied here.
    # vault.yml lives ONLY on the WSL control host (this machine) — see CLAUDE.md
    # "Secrets" and semaphore_infisical_implementation.md Task 2 ("don't copy
    # vault.yml to the edge"). Phase 2+ playbooks running on the edge resolve
    # their application secrets from Infisical at runtime instead
    # (roles/infisical/tasks/lookup.yml — see deploy_edge.yml's "Secrets" pre_tasks);
    # the only WSL→node secret crossing is the one-time additive seed (this play's
    # "Infisical | Seed application secrets..." task, which authenticates over the
    # wire and never writes the file itself to the node) and the runtime identity's
    # credentials (rendered straight to /home/homelab/.infisical_runtime_auth.yml
    # by roles/infisical, sourced from vault_infisical_runtime_client_* — never
    # routed through a copied vault.yml).

    - name: "Secrets | Copy local network variables"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../inventories/group_vars/all/overrides.yml"
        dest: "{{ homelab_repo_path }}/inventories/group_vars/all/overrides.yml"
        owner: homelab
        group: homelab
        mode: "0644"
      tags: [secrets]

    - name: "Secrets | Copy homelab SSH private key"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.ssh/homelab"
        dest: /home/homelab/.ssh/homelab
        owner: homelab
        group: homelab
        mode: "0600"
      tags: [secrets]

    - name: "Secrets | Copy homelab SSH public key"
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../.ssh/homelab.pub"
        dest: /home/homelab/.ssh/homelab.pub
        owner: homelab
        group: homelab
        mode: "0644"
      tags: [secrets]

    - name: "Repo | Set repo ownership"
      ansible.builtin.file:
        path: "{{ homelab_repo_path }}"
        owner: homelab
        group: homelab
        recurse: true
      tags: [repo]

    # ── Infisical + Semaphore ────────────────────────────────────────────────
    # Brought up here, in Phase 1, rather than left to deploy_edge.yml's full-stack
    # `docker compose up`: the brief requires both services live and Infisical
    # seeded with application secrets by the end of bootstrap, so that Phase 2+
    # playbooks can assume Infisical is the canonical app-secret store from their
    # very first run. Brought up individually (not the whole edge stack) so
    # cloudflared/Caddy/Pi-hole still come up under deploy_edge.yml's control,
    # as before.
    #
    # Reachability during this window: the firewall task below has not run yet,
    # so the node still has its OS-default (permissive) inbound policy — the
    # seed task can reach Infisical over the LAN. Once "Firewall | Configure and
    # enable" runs at the end of this play, ports 8222/3010 become Tailscale-only
    # (group_vars/edge.yml ufw_rules) — the steady-state access path thereafter.
    - name: "Infisical | Render operational .env (node-generated secrets)"
      ansible.builtin.include_role:
        name: infisical
      tags: [infisical]

    - name: "Docker | Bring up Infisical (db, redis, app)"
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.edge.yml up -d infisical-db infisical-redis infisical
        chdir: "{{ homelab_repo_path }}"
      become: false
      changed_when: true
      tags: [infisical]

    - name: "Infisical | Wait for the API port to accept connections"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 8222
        timeout: 180
      become: false
      tags: [infisical]

    - name: "Infisical | Seed application secrets from the WSL vault.yml (additive, create-if-absent)"
      ansible.builtin.include_tasks: "{{ playbook_dir }}/../roles/infisical/tasks/seed.yml"
      vars:
        infisical_api_url: "http://{{ ansible_host }}:8222/api"
      tags: [infisical, seed]

    - name: "Semaphore | Render operational .env (node-generated + vault-seeded secrets)"
      ansible.builtin.include_role:
        name: semaphore
      tags: [semaphore]

    - name: "Docker | Bring up Semaphore (db, app)"
      ansible.builtin.command:
        cmd: docker compose -f docker-compose.edge.yml up -d semaphore-db semaphore
        chdir: "{{ homelab_repo_path }}"
      become: false
      changed_when: true
      tags: [semaphore]

    - name: "Firewall | Configure and enable"
      ansible.builtin.include_role:
        name: firewall
      vars:
        firewall_rules:
          - { port: 53,   proto: udp, src: "{{ lan_subnet }}",          comment: "Pi-hole DNS UDP (LAN only)" }
          - { port: 53,   proto: tcp, src: "{{ lan_subnet }}",          comment: "Pi-hole DNS TCP (LAN only)" }
          - { port: 8222, proto: tcp, src: "{{ tailscale_cgnat_range }}", comment: "Infisical UI/API (Tailscale only)" }
          - { port: 3010, proto: tcp, src: "{{ tailscale_cgnat_range }}", comment: "Semaphore UI (Tailscale only)" }
      tags: [firewall]

    # ── Phase 2 handoff ──────────────────────────────────────────────────────
    # Runs deploy_edge.yml locally on the edge (as 'homelab', the Phase 2+
    # automation user) as bootstrap's final step — the operator shouldn't have
    # to SSH in separately just to kick off the self-deploy that was always the
    # very next required action. Safe to chain: deploy_edge.yml is idempotent
    # and asserts its own preconditions (compose file present, secrets resolvable)
    # before touching anything. Skipped automatically on a targeted re-run (e.g.
    # `--tags infisical,seed,semaphore` for "First-run Infisical Setup" follow-up)
    # since it carries its own `deploy` tag, not `always`.
    - name: "Deploy | Hand off to Phase 2 (deploy_edge.yml) locally on the edge"
      ansible.builtin.command:
        cmd: ansible-playbook playbooks/deploy_edge.yml --limit homelab-edge
        chdir: "{{ homelab_repo_path }}"
      become_user: homelab
      changed_when: true
      tags: [deploy]

  post_tasks:
    - name: "Meta | Bootstrap complete"
      ansible.builtin.debug:
        msg: >
          homelab-edge bootstrap complete — Phase 2 (deploy_edge.yml) ran
          automatically as the final bootstrap step, so the full edge stack
          (Infisical, Semaphore, Pi-hole, Caddy, cloudflared, fail2ban, Unbound,
          Alloy, Tailscale) is up and verified. Infisical
          (http://{{ ansible_host }}:8222 over Tailscale) is seeded with
          application secrets; Semaphore (http://{{ ansible_host }}:3010 over
          Tailscale) is up. Disable or revoke the Infisical bootstrap machine
          identity now (UI -> Access Control -> Identities) if you haven't
          already — see vault.yml.example.
          Re-run Phase 2 anytime with: ansible-playbook playbooks/deploy_edge.yml
          --limit homelab-edge (from the edge as 'homelab', or from your PC
          against prod.yml).