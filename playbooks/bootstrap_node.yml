---
# playbooks/bootstrap_node.yml
#
# Phase 3 — Run from homelab-edge (as the homelab user) to bootstrap any new
# node from a fresh OS install. Requires --limit <node>, e.g.:
#
#   ansible-playbook playbooks/bootstrap_node.yml --limit homelab-observe
#
# No --ask-pass/--ask-become-pass, ever. A probe play (below) figures out on
# its own whether the target is a fresh OS install (admin user, password auth,
# port 22) or already hardened (homelab user, key auth, ssh_port) and connects
# accordingly — same idea as bootstrap_edge.yml's probe play, generalized to
# whichever node --limit names. The admin account's password never lives in
# this repo's Ansible run on this node: it's read from
# /home/homelab/.node_bootstrap_admin_pass, written once during Phase 1
# (bootstrap_edge.yml, which has vault.yml) from vault_admin_become_password —
# vault.yml itself never leaves the WSL/PC control host, and never touches
# homelab-edge. Safe to re-run.
#
# Requires: roles/users, roles/base_hardening, roles/docker, roles/docker_compose, roles/tailscale
# See: BOOTSTRAP.md § Phase 3

# ── Probe play ─────────────────────────────────────────────────────────────────
# hosts: all + connection: local — deliberately NOT hosts: localhost. Ansible
# intersects --limit against every play's host pattern, including implicit
# `hosts: localhost` plays, and localhost never matches a --limit pattern like
# homelab-observe — so a `hosts: localhost` probe play here would get silently
# skipped ("skipping: no hosts matched"), add_host would never run, and the
# Bootstrap play below would skip too ("Could not match supplied host
# pattern"). Pointing hosts: at `all` — which includes the real observe/svc
# inventory hosts _valid_nodes already assumes exist (inventories/prod.yml) —
# means --limit <node> actually narrows the play to that one host.
# connection: local keeps every task executing on the control node
# (homelab-edge), never opening a real SSH connection to the not-yet-
# configured target — that's still done by wait_for (TCP only) below, exactly
# as before. _target_node is inventory_hostname now, not ansible_limit — each
# matched play host IS the target.
#
# Builds two candidate tiers for that node and probes TCP reachability only
# (not auth — same as bootstrap_edge.yml):
#
#   Hardened (tried first): tailscale_ip_<suffix>:ssh_port, then ip_<suffix>:ssh_port
#                            — user homelab, key /home/homelab/.ssh/homelab
#   Fresh    (fallback):    ip_<suffix>:fallback_ssh_port
#                            — user admin, password from
#                              /home/homelab/.node_bootstrap_admin_pass
#
# The fresh candidate has no Tailscale variant — Tailscale isn't installed
# until this same playbook's tailscale role runs. If ssh_port == fallback_ssh_port
# the two tiers probe the same port and TCP alone can't disambiguate — same
# inherent limitation base_hardening's own re-run probe already accepts; set a
# non-default ssh_port to avoid the ambiguity.
- name: "Probe | Discover reachable SSH endpoint and identity for target node"
  hosts: all
  connection: local
  become: false
  gather_facts: false

  vars:
    _target_node: "{{ inventory_hostname }}"
    _valid_nodes: "{{ (groups['observe'] | default([])) + (groups['svc'] | default([])) }}"
    _suffix: "{{ _target_node | regex_replace('^homelab-', '') | replace('-', '_') }}"
    _ip: "{{ lookup('vars', 'ip_' ~ _suffix, default='EDIT_BEFORE_USE') }}"
    _tailscale_ip: "{{ lookup('vars', 'tailscale_ip_' ~ _suffix, default='EDIT_BEFORE_USE') }}"
    _tailscale_available: "{{ _tailscale_ip != 'EDIT_BEFORE_USE' }}"
    _has_custom_port: "{{ ssh_port | int != fallback_ssh_port | int }}"
    _admin_pw: "{{ lookup('file', '/home/homelab/.node_bootstrap_admin_pass', errors='ignore') | default('', true) }}"
    _hardened_candidates: >-
      {{
        ([{'host': _tailscale_ip, 'port': ssh_port | int,
           'label': 'Tailscale hardened ' ~ _tailscale_ip ~ ':' ~ ssh_port}]
         if _tailscale_available else [])
        + [{'host': _ip, 'port': ssh_port | int,
            'label': 'LAN hardened ' ~ _ip ~ ':' ~ ssh_port}]
      }}
    _fresh_candidates: >-
      {{
        [{'host': _ip, 'port': fallback_ssh_port | int,
          'label': 'LAN fresh ' ~ _ip ~ ':' ~ fallback_ssh_port}]
        if (_admin_pw | length > 0) else []
      }}
    _all_candidates: "{{ _hardened_candidates + _fresh_candidates }}"

  tasks:
    - name: "Probe | Assert --limit names exactly one known node"
      ansible.builtin.assert:
        that:
          - ansible_play_hosts_all | length == 1
        fail_msg: >-
          bootstrap_node.yml requires --limit <node>, naming exactly one host
          from the observe or svc inventory groups (matched {{
          ansible_play_hosts_all | length }}: {{ ansible_play_hosts_all | join(', ') }}).
          See BOOTSTRAP.md § Phase 3.
      tags: [always]

    - name: "Probe | Assert target node is a known observe/svc node"
      ansible.builtin.assert:
        that: _target_node in _valid_nodes
        fail_msg: >-
          {{ _target_node }} is not in the observe or svc inventory groups
          (known: {{ _valid_nodes | join(', ') }}). See BOOTSTRAP.md § Phase 3.
      tags: [always]

    - name: "Probe | Assert ip_{{ _suffix }} is set in overrides.yml"
      ansible.builtin.assert:
        that: _ip != 'EDIT_BEFORE_USE'
        fail_msg: >-
          ip_{{ _suffix }} is still EDIT_BEFORE_USE. Set it in overrides.yml
          then re-run. See BOOTSTRAP.md § Phase 3.
      tags: [always]

    - name: "Probe | Resolve vault_* secrets from Infisical"
      ansible.builtin.include_role:
        name: infisical
        tasks_from: lookup.yml
      vars:
        infisical_lookup_keys:
          - network/SSH_ADMIN_PUBKEY
          - network/SSH_HOMELAB_PUBKEY
          - network/SSH_DEPLOY_PUBKEY
          - ntfy/TOKEN
          - discord/ALERTS_WEBHOOK
          - tailscale/OAUTH_CLIENT_ID
          - tailscale/OAUTH_CLIENT_SECRET
      tags: [always]

    - name: "Probe | Warn if no fresh-node candidate is available"
      ansible.builtin.debug:
        msg: >-
          /home/homelab/.node_bootstrap_admin_pass is missing or empty on
          this node — only the already-hardened candidate will be probed.
          This file is written by bootstrap_edge.yml (Phase 1); re-run Phase 1
          if this is meant to be a fresh-node bootstrap.
      when: _admin_pw | length == 0
      tags: [always]

    - name: "Probe | Show candidates"
      ansible.builtin.debug:
        msg: "Probing {{ _target_node }}: {{ _all_candidates | map(attribute='label') | list | join(' → ') }}"
      tags: [always]

    - name: "Probe | Test TCP reachability"
      ansible.builtin.wait_for:
        host: "{{ item.host }}"
        port: "{{ item.port }}"
        state: started
        timeout: 5
      register: _probe_results
      ignore_errors: true
      changed_when: false
      loop: "{{ _all_candidates }}"
      loop_control:
        label: "{{ item.label }}"
      tags: [always]

    - name: "Probe | Collect successes"
      ansible.builtin.set_fact:
        _successful_probes: >-
          {{ _probe_results.results | selectattr('failed', 'equalto', false) | list }}
      tags: [always]

    - name: "Probe | Fail if nothing reachable"
      ansible.builtin.fail:
        msg: >-
          No SSH endpoint reachable for {{ _target_node }}.
          Tried: {{ _all_candidates | map(attribute='label') | list | join(', ') }}.
          Check the node is powered on and reachable, ip_{{ _suffix }} is
          correct in overrides.yml, and — for a fresh node —
          /home/homelab/.node_bootstrap_admin_pass exists on this host.
          See BOOTSTRAP.md § Phase 3.
      when: _successful_probes | length == 0
      tags: [always]

    - name: "Probe | Show winner"
      ansible.builtin.debug:
        msg: "Connecting via: {{ _successful_probes[0].item.label }}"
      tags: [always]

    - name: "Probe | Scan target node SSH host key"
      ansible.builtin.shell:
        cmd: "ssh-keyscan -p {{ _successful_probes[0].item.port }} {{ _successful_probes[0].item.host }} 2>/dev/null"
      register: _target_host_keys
      changed_when: false
      tags: [always]

    - name: "Probe | Add target node SSH host key to known_hosts"
      ansible.builtin.known_hosts:
        name: "{{ item.split(' ')[0] }}"
        key: "{{ item }}"
        path: /home/homelab/.ssh/known_hosts
        state: present
      loop: "{{ _target_host_keys.stdout_lines | select('match', '^[^#]') | list }}"
      no_log: true
      tags: [always]

    - name: "Probe | Inject connection facts for target node (hardened)"
      ansible.builtin.add_host:
        name: "{{ _target_node }}"
        groups: node_bootstrap
        ansible_host: "{{ _successful_probes[0].item.host }}"
        ansible_port: "{{ _successful_probes[0].item.port }}"
        ansible_user: homelab
        ansible_ssh_private_key_file: /home/homelab/.ssh/homelab
        vault_admin_ssh_pubkey: "{{ infisical_secrets['network/SSH_ADMIN_PUBKEY'] }}"
        vault_homelab_ssh_pubkey: "{{ infisical_secrets['network/SSH_HOMELAB_PUBKEY'] }}"
        vault_deploy_ssh_pubkey: "{{ infisical_secrets['network/SSH_DEPLOY_PUBKEY'] }}"
        vault_ntfy_token: "{{ infisical_secrets['ntfy/TOKEN'] }}"
        vault_discord_alerts_webhook: "{{ infisical_secrets['discord/ALERTS_WEBHOOK'] }}"
        vault_tailscale_oauth_client_id: "{{ infisical_secrets['tailscale/OAUTH_CLIENT_ID'] }}"
        vault_tailscale_oauth_client_secret: "{{ infisical_secrets['tailscale/OAUTH_CLIENT_SECRET'] }}"
      changed_when: false
      when: _successful_probes[0].item in _hardened_candidates
      tags: [always]

    - name: "Probe | Inject connection facts for target node (fresh)"
      ansible.builtin.add_host:
        name: "{{ _target_node }}"
        groups: node_bootstrap
        ansible_host: "{{ _successful_probes[0].item.host }}"
        ansible_port: "{{ _successful_probes[0].item.port }}"
        ansible_user: admin
        ansible_password: "{{ _admin_pw }}"
        ansible_become_password: "{{ _admin_pw }}"
        vault_admin_ssh_pubkey: "{{ infisical_secrets['network/SSH_ADMIN_PUBKEY'] }}"
        vault_homelab_ssh_pubkey: "{{ infisical_secrets['network/SSH_HOMELAB_PUBKEY'] }}"
        vault_deploy_ssh_pubkey: "{{ infisical_secrets['network/SSH_DEPLOY_PUBKEY'] }}"
        vault_ntfy_token: "{{ infisical_secrets['ntfy/TOKEN'] }}"
        vault_discord_alerts_webhook: "{{ infisical_secrets['discord/ALERTS_WEBHOOK'] }}"
        vault_tailscale_oauth_client_id: "{{ infisical_secrets['tailscale/OAUTH_CLIENT_ID'] }}"
        vault_tailscale_oauth_client_secret: "{{ infisical_secrets['tailscale/OAUTH_CLIENT_SECRET'] }}"
      changed_when: false
      no_log: true
      when: _successful_probes[0].item in _fresh_candidates
      tags: [always]

- name: "Bootstrap | Node | Base system, users, Docker, and Tailscale"
  hosts: node_bootstrap
  become: true
  gather_facts: true

  vars:
    play_description: >
      Bootstraps a new homelab node from a fresh OS install.
      Creates system users, installs Docker, hardens SSH,
      configures the firewall, and joins Tailscale.
      Safe to re-run.

  pre_tasks:
    - name: "Meta | Show play description"
      ansible.builtin.debug:
        msg: "{{ play_description }}"

    - name: "Meta | Confirm target"
      ansible.builtin.debug:
        msg: "Bootstrapping {{ inventory_hostname }} ({{ ansible_host }})"

    - name: "System | Set hostname"
      ansible.builtin.hostname:
        name: "{{ node_hostname }}"

    - name: "System | Update apt cache"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: "System | Install base packages"
      ansible.builtin.apt:
        name: "{{ base_packages }}"
        state: present

  roles:
    - role: users
      tags: [base, users]

    - role: base_hardening
      tags: [base, hardening]

    - role: docker
      tags: [docker]

    - role: docker_compose
      tags: [docker]

    - role: tailscale
      tags: [tailscale]

  tasks:
    - name: "Firewall | Configure and enable"
      ansible.builtin.include_role:
        name: firewall
      vars:
        firewall_rules: "{{ ufw_rules | default(ufw_rules_base | default([])) }}"
      tags: [firewall]

    - name: "Observability | Deploy node-exporter"
      community.docker.docker_container:
        name: node-exporter
        image: prom/node-exporter:latest
        restart_policy: unless-stopped
        pid_mode: host
        volumes:
          - /proc:/host/proc:ro
          - /sys:/host/sys:ro
          - /:/rootfs:ro
        command:
          - "--path.procfs=/host/proc"
          - "--path.sysfs=/host/sys"
          - "--path.rootfs=/rootfs"
        state: started
      tags: [observability, node-exporter]

  # Grafana Alloy (log shipping to Loki) is applied in deploy_*.yml, not here.
  # Loki doesn't exist until homelab-observe is deployed — Alloy at bootstrap
  # would fail silently until then.

  post_tasks:
    - name: "Ansible | Scan new node SSH host keys (from edge)"
      ansible.builtin.shell:
        cmd: ssh-keyscan -p {{ ssh_port }} {{ ansible_host }} 2>/dev/null
      register: _node_host_keys
      changed_when: false
      delegate_to: localhost
      become: false

    - name: "Ansible | Add new node host keys to edge homelab known_hosts"
      ansible.builtin.known_hosts:
        name: "{{ item.split(' ')[0] }}"
        key: "{{ item }}"
        path: /home/homelab/.ssh/known_hosts
        state: present
      loop: "{{ _node_host_keys.stdout_lines | select('match', '^[^#]') | list }}"
      no_log: true
      delegate_to: localhost
      become: false

    - name: "Meta | Bootstrap complete"
      ansible.builtin.debug:
        msg: >
          {{ inventory_hostname }} bootstrap complete.
          Run the relevant deploy playbook next:
            deploy_observe.yml  (for homelab-observe)
            deploy_svc.yml      (for homelab-svc-*)
