---
# playbooks/deploy_edge.yml
#
# Phase 2 — Deploys all edge services on homelab-edge.
# Run from homelab-edge itself as the homelab user.
# Idempotent — safe to re-run on every deployment.
#
# Usage:
#   ansible-playbook playbooks/deploy_edge.yml \
#     --limit homelab-edge
#
# Tags:
#   --tags repo            Git pull only
#   --tags fail2ban        fail2ban only
#   --tags tailscale       Tailscale only
#   --tags deploy-service  Install deploy-service + deploy homelab-edge-services
#   --tags docker          Same as deploy-service (alias for backwards compat)
#   --tags pihole          Unbound only (Pi-hole itself managed by deploy-service)
#   --tags alloy           Grafana Alloy log shipper only
#   --tags unbound         Unbound recursive resolver (host service) only
#   --tags verify          Health checks only (no deploy)
#
# Requires: roles/fail2ban, roles/tailscale, roles/alloy, roles/unbound
# No longer requires: roles/edge_services (config files are static in
#   homelab-edge-services; secrets injected by deploy-service from Infisical)
#
# Secrets: deploy-service fetches TUNNEL_TOKEN, PIHOLE_WEB_PASSWORD, and
# IP_*/TAILSCALE_IP_* from Infisical for docker-compose env injection.
# Additionally, lookup.yml is called once to resolve pihole/WEB_PASSWORD so
# pihole setpassword can be run post-compose (Pi-hole v6 ignores WEBPASSWORD).

- name: "Deploy | Edge | Firewall, fail2ban, and services"
  hosts: edge
  become: true
  gather_facts: true

  pre_tasks:
    - name: "Repo | Update to latest"
      ansible.builtin.git:
        repo: "git@github.com:{{ github_org }}/homelab.git"
        dest: "{{ homelab_repo_path }}"
        version: "{{ homelab_repo_branch }}"
        accept_hostkey: true
        key_file: /home/homelab/.ssh/github
        force: false
      become_user: homelab
      tags: [repo]

    - name: "Users | Keep deploy sudoers rule current (points at wrapper script, not ansible-playbook directly)"
      ansible.builtin.copy:
        dest: /etc/sudoers.d/deploy
        content: "deploy ALL=(ALL) NOPASSWD: {{ homelab_repo_path }}/scripts/deploy.sh\n"
        owner: root
        group: root
        mode: "0440"
        validate: "visudo -cf %s"
      tags: [users, repo]

    # ── deploy-service ────────────────────────────────────────────────────────
    # Installed into an isolated virtualenv to satisfy PEP 668 (Raspberry Pi OS
    # Bookworm marks the system Python as externally managed). Editable install
    # means the code is always current after a git pull — no reinstall needed.
    # python3-venv is installed by bootstrap_edge.yml. The venv is created via
    # `python3 -m venv` (built-in module) rather than the standalone `virtualenv`
    # binary, which is not installed; `creates:` makes the command task a no-op
    # on re-runs. pip is then pointed directly at the venv's own executable.
    - name: "deploy-service | Ensure python3-venv is present"
      ansible.builtin.apt:
        name: python3-venv
        state: present
        cache_valid_time: 3600
      tags: [deploy-service, docker]

    - name: "deploy-service | Create virtualenv"
      ansible.builtin.command:
        cmd: python3 -m venv /opt/deploy-service-venv
        creates: /opt/deploy-service-venv/bin/python3
      tags: [deploy-service, docker]

    - name: "deploy-service | Install into virtualenv (idempotent)"
      ansible.builtin.pip:
        name: "file://{{ homelab_repo_path }}/deploy-service"
        editable: true
        state: present
        executable: /opt/deploy-service-venv/bin/pip
      tags: [deploy-service, docker]

    - name: "deploy-service | Ensure service checkout root exists"
      ansible.builtin.file:
        path: /srv/services
        state: directory
        owner: homelab
        group: homelab
        mode: "0755"
      tags: [deploy-service, docker]

    - name: "deploy-service | Deploy homelab-edge-services"
      ansible.builtin.command:
        cmd: /opt/deploy-service-venv/bin/deploy-service deploy homelab-edge-services --config {{ homelab_repo_path }}/services.yml
      become: false
      tags: [deploy-service, docker]

    - name: "Pihole | Fetch password from Infisical and apply via pihole setpassword"
      no_log: true
      block:
        - name: "Pihole | Fetch pihole/WEB_PASSWORD from Infisical"
          ansible.builtin.include_role:
            name: infisical
            tasks_from: lookup.yml
          vars:
            infisical_lookup_keys:
              - pihole/WEB_PASSWORD

        - name: "Pihole | Set web admin password (Pi-hole v6 ignores WEBPASSWORD env var)"
          ansible.builtin.command:
            cmd: docker exec pihole pihole setpassword "{{ infisical_secrets['pihole/WEB_PASSWORD'] }}"
          become: false
          changed_when: true
      tags: [deploy-service, docker, pihole]

  roles:
    - role: fail2ban
      tags: [fail2ban]

    - role: tailscale
      tags: [tailscale]
      vars:
        tailscale_up: true

    - role: alloy
      tags: [alloy]

    - role: unbound
      tags: [unbound]

  post_tasks:
    - name: "Verify | Unbound service is active"
      ansible.builtin.systemd:
        name: unbound
      register: unbound_svc
      failed_when: unbound_svc.status.ActiveState != "active"
      changed_when: false
      tags: [verify, unbound]

    - name: "Verify | Unbound is listening on port {{ unbound_port }}"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ unbound_port }}"
        timeout: 10
      become: false
      tags: [verify, unbound]

    - name: "Verify | Pi-hole is listening on port 53"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 53
        timeout: 15
      become: false
      tags: [verify, docker]

    - name: "Verify | Caddy is listening on port 80"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 80
        timeout: 10
      become: false
      tags: [verify, docker]

    - name: "Verify | cloudflared is running"
      ansible.builtin.command:
        cmd: docker inspect --format="{{ '{{' }}.State.Status{{ '}}' }}" cloudflared
      register: cloudflared_status
      changed_when: false
      failed_when: cloudflared_status.stdout != "running"
      become: false
      tags: [verify, docker]

    - name: "Verify | All appliance containers are running"
      ansible.builtin.command:
        cmd: >
          docker inspect --format="{{ '{{' }}.Name{{ '}}' }}={{ '{{' }}.State.Status{{ '}}' }}"
          caddy pihole pihole-exporter portainer-agent
      register: container_statuses
      changed_when: false
      failed_when: "'restarting' in container_statuses.stdout or 'exited' in container_statuses.stdout"
      become: false
      tags: [verify, docker]

    - name: "Verify | Tailscale is connected"
      ansible.builtin.command:
        cmd: tailscale status
      register: tailscale_check
      changed_when: false
      failed_when: tailscale_check.rc != 0
      become: false
      tags: [verify, tailscale]

    - name: "Verify | Internet reachable from edge"
      ansible.builtin.uri:
        url: https://cloudflare.com
        status_code: 200
        timeout: 15
      become: false
      tags: [verify]

    - name: "Meta | Deploy complete"
      ansible.builtin.debug:
        msg:
          - "Edge deployment complete"
          - "unbound: {{ unbound_svc.status.ActiveState }}"
          - "cloudflared: {{ cloudflared_status.stdout }}"
          - "containers: {{ container_statuses.stdout_lines }}"
          - "tailscale: {{ 'connected' if tailscale_check.rc == 0 else 'disconnected' }}"
