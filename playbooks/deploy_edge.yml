---
# playbooks/deploy_edge.yml
#
# Phase 2 — Deploys all edge services on homelab-edge.
# Run from homelab-edge itself (or from PC targeting the edge via prod.yml).
# Idempotent — safe to re-run on every deployment.
#
# Usage:
#   ansible-playbook playbooks/deploy_edge.yml \
#     --limit homelab-edge
#
# Tags:
#   --tags repo        Git pull only
#   --tags fail2ban    fail2ban only
#   --tags tailscale   Tailscale only
#   --tags docker      Docker Compose stack only
#   --tags pihole      Pi-hole + Unbound only
#   --tags caddy       Caddy reverse proxy config only
#   --tags alloy       Grafana Alloy log shipper only
#   --tags unbound     Unbound recursive resolver (host service) only
#   --tags verify      Health checks only (no deploy)
#
# Requires: roles/fail2ban, roles/tailscale, roles/alloy, roles/unbound, roles/edge_services
# Note: base_hardening runs in bootstrap_edge.yml (Phase 1) only.
#       Run playbooks/update_all.yml for OS package upgrades.
#
# Secrets: this node carries no vault.yml (see CLAUDE.md "Secrets" —
# semaphore_infisical_implementation.md Task 2). The application secrets this
# play needs (cloudflare/TUNNEL_TOKEN, pihole/WEB_PASSWORD) are resolved at
# runtime from Infisical via roles/infisical/tasks/lookup.yml, using the
# READ-ONLY runtime machine identity whose credentials were written, once,
# during Phase 1 bootstrap to /home/homelab/.infisical_runtime_auth.yml.

- name: "Deploy | Edge | Firewall, fail2ban, and services"
  hosts: edge
  become: true
  gather_facts: true

  vars:
    compose_file: "docker-compose.edge.yml"
    compose_dir: "{{ homelab_repo_path }}"

  pre_tasks:
    - name: "Repo | Update to latest"
      ansible.builtin.git:
        repo: "git@github.com:{{ github_org }}/homelab.git"
        dest: "{{ homelab_repo_path }}"
        version: "{{ homelab_repo_branch }}"
        accept_hostkey: true
        key_file: /home/homelab/.ssh/github
        force: false
      become_user: homelab
      tags: [repo]

    # ── Secrets ───────────────────────────────────────────────────────────────
    # No vault.yml lives on this node by design (CLAUDE.md "Secrets" —
    # semaphore_infisical_implementation.md Task 2: "don't copy vault.yml to the
    # edge"). The handful of application secrets this playbook needs were already
    # seeded into Infisical during Phase 1 bootstrap (roles/infisical/tasks/bootstrap_instance.yml)
    # — resolve them at runtime through the READ-ONLY runtime identity instead.
    # This is the reference conversion for Task #5; camunda/observe/svc roles
    # still read straight from vault.yml (deferred — see TROUBLESHOOTING.md
    # "Vault → Infisical conversion status").
    - name: "Secrets | Fetch application secrets from Infisical (read-only runtime identity)"
      ansible.builtin.include_role:
        name: infisical
        tasks_from: lookup.yml
      vars:
        infisical_lookup_keys:
          - cloudflare/TUNNEL_TOKEN
          - pihole/WEB_PASSWORD
      tags: [always]

    - name: "Preflight | Assert required secrets resolved"
      ansible.builtin.assert:
        that:
          - infisical_secrets['cloudflare/TUNNEL_TOKEN'] is defined
          - infisical_secrets['pihole/WEB_PASSWORD'] is defined
          - github_org is defined
        fail_msg: >-
          Required secret unresolved — check that Phase 1 provisioned and
          seeded Infisical successfully (bootstrap_edge.yml --tags
          infisical,bootstrap — see "Infisical bootstrap | Summary" in its
          output, or re-run with -vvv; it's a no-op against an
          already-initialised instance, see TROUBLESHOOTING.md "Bootstrap
          playbook reports Infisical already initialised"), that the runtime
          identity has read access to the homelab/production project, and that
          Infisical itself is reachable at {{ infisical_runtime_api_url }}.
      tags: [always]

    - name: "Preflight | Verify compose file exists on node"
      ansible.builtin.stat:
        path: "{{ compose_dir }}/{{ compose_file }}"
      register: _compose_file
      tags: [always]

    - name: "Preflight | Abort if compose file missing"
      ansible.builtin.fail:
        msg: "{{ compose_file }} not found in {{ compose_dir }} — repo may not have cloned correctly"
      when: not _compose_file.stat.exists
      tags: [always]

  roles:
    - role: fail2ban
      tags: [fail2ban]

    - role: tailscale
      tags: [tailscale]
      vars:
        tailscale_up: true

    - role: alloy
      tags: [alloy]

    - role: unbound
      tags: [unbound]

    - role: edge_services
      tags: [docker, pihole]
      vars:
        pihole_web_password: "{{ infisical_secrets['pihole/WEB_PASSWORD'] }}"
        cloudflared_tunnel_token: "{{ infisical_secrets['cloudflare/TUNNEL_TOKEN'] }}"

  post_tasks:
    - name: "Docker | Pull latest images"
      ansible.builtin.command:
        cmd: docker compose -f {{ compose_file }} pull
        chdir: "{{ compose_dir }}"
      environment:
        TUNNEL_TOKEN: "{{ infisical_secrets['cloudflare/TUNNEL_TOKEN'] }}"
        PIHOLE_WEB_PASSWORD: "{{ infisical_secrets['pihole/WEB_PASSWORD'] }}"
        TZ: "{{ timezone }}"
      become: false
      no_log: true
      tags: [docker]
      changed_when: true

    - name: "Docker | Apply edge stack"
      ansible.builtin.command:
        cmd: docker compose -f {{ compose_file }} up -d --remove-orphans
        chdir: "{{ compose_dir }}"
      environment:
        TUNNEL_TOKEN: "{{ infisical_secrets['cloudflare/TUNNEL_TOKEN'] }}"
        PIHOLE_WEB_PASSWORD: "{{ infisical_secrets['pihole/WEB_PASSWORD'] }}"
        TZ: "{{ timezone }}"
      become: false
      no_log: true
      tags: [docker]
      changed_when: true

    - name: "Docker | Prune unused images"
      ansible.builtin.command:
        cmd: docker image prune -f
      become: false
      tags: [docker]
      changed_when: true

    - name: "Verify | Unbound service is active"
      ansible.builtin.systemd:
        name: unbound
      register: unbound_svc
      failed_when: unbound_svc.status.ActiveState != "active"
      changed_when: false
      tags: [verify, unbound]

    - name: "Verify | Unbound is listening on port {{ unbound_port }}"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: "{{ unbound_port }}"
        timeout: 10
      become: false
      tags: [verify, unbound]

    - name: "Verify | Pi-hole is listening on port 53"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 53
        timeout: 15
      become: false
      tags: [verify, docker]

    - name: "Verify | Caddy is listening on port 80"
      ansible.builtin.wait_for:
        host: 127.0.0.1
        port: 80
        timeout: 10
      become: false
      tags: [verify, docker]

    - name: "Verify | cloudflared is running"
      ansible.builtin.command:
        cmd: docker inspect --format="{{ '{{' }}.State.Status{{ '}}' }}" cloudflared
      register: cloudflared_status
      changed_when: false
      failed_when: cloudflared_status.stdout != "running"
      become: false
      tags: [verify, docker]

    - name: "Verify | All edge containers are running"
      ansible.builtin.command:
        cmd: >
          docker inspect --format="{{ '{{' }}.Name{{ '}}' }}={{ '{{' }}.State.Status{{ '}}' }}"
          caddy pihole pihole-exporter node-exporter portainer-agent
      register: container_statuses
      changed_when: false
      failed_when: "'restarting' in container_statuses.stdout or 'exited' in container_statuses.stdout"
      become: false
      tags: [verify, docker]

    - name: "Verify | Tailscale is connected"
      ansible.builtin.command:
        cmd: tailscale status
      register: tailscale_check
      changed_when: false
      failed_when: tailscale_check.rc != 0
      become: false
      tags: [verify, tailscale]

    - name: "Verify | Internet reachable from edge"
      ansible.builtin.uri:
        url: https://cloudflare.com
        status_code: 200
        timeout: 15
      become: false
      tags: [verify]

    - name: "Meta | Deploy complete"
      ansible.builtin.debug:
        msg:
          - "Edge deployment complete"
          - "unbound: {{ unbound_svc.status.ActiveState }}"
          - "cloudflared: {{ cloudflared_status.stdout }}"
          - "containers: {{ container_statuses.stdout_lines }}"
          - "tailscale: {{ 'connected' if tailscale_check.rc == 0 else 'disconnected' }}"