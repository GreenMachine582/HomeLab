---
# playbooks/backup.yml
#
# Runs database backups across all svc nodes plus homelab-edge (Infisical and
# Semaphore each carry their own Postgres database — see docker-compose.edge.yml).
# Backups are stored locally on the node and can be pulled off via rsync/scp.
#
# Usage:
#   ansible-playbook playbooks/backup.yml
#
#   # Specific node
#   ansible-playbook playbooks/backup.yml \
#     --limit homelab-svc-01
#   ansible-playbook playbooks/backup.yml \
#     --limit homelab-edge
#
# Tags:
#   --tags postgres    PostgreSQL pg_dump only
#   --tags cleanup     Remove backups older than retain_days

- import_playbook: resolve_node_ips.yml

- name: "Backup | Svc nodes and edge | Database backups"
  hosts: svc:edge
  become: true
  gather_facts: true

  vars:
    backup_timestamp: "{{ ansible_date_time.date }}"

  tasks:
    # ── PostgreSQL backup (svc-01: Camunda DB) ────────────────────────────────
    - name: "Backup | Postgres | Ensure backup dir exists (svc-01)"
      ansible.builtin.file:
        path: "{{ postgres_backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      when:
        - inventory_hostname == 'homelab-svc-01'
        - postgres_backup_dir is defined
      tags: [postgres]

    - name: "Backup | Postgres | Dump Camunda database (svc-01)"
      ansible.builtin.command:
        cmd: >
          docker exec camunda-postgres
          pg_dump -U {{ vault_camunda_db_user }} camunda
          -f /backups/camunda_{{ backup_timestamp }}.sql
      when: inventory_hostname == 'homelab-svc-01'
      tags: [postgres]
      changed_when: true
      no_log: true   # Suppress output (may contain connection strings)

    - name: "Backup | Postgres | Compress backup (svc-01)"
      ansible.builtin.command:
        cmd: gzip -f {{ postgres_backup_dir }}/camunda_{{ backup_timestamp }}.sql
      when: inventory_hostname == 'homelab-svc-01'
      tags: [postgres]
      changed_when: true

    # ── PostgreSQL backup (svc-02: GreenTechHub DB) ───────────────────────────
    - name: "Backup | Postgres | Dump GreenTechHub database (svc-02)"
      ansible.builtin.command:
        cmd: >
          docker exec greentechhub-postgres
          pg_dump -U {{ vault_greentechhub_db_user }} greentechhub
          -f /backups/greentechhub_{{ backup_timestamp }}.sql
      when: inventory_hostname == 'homelab-svc-02'
      tags: [postgres]
      changed_when: true
      no_log: true

    - name: "Backup | Postgres | Compress backup (svc-02)"
      ansible.builtin.command:
        cmd: gzip -f {{ postgres_backup_dir }}/greentechhub_{{ backup_timestamp }}.sql
      when: inventory_hostname == 'homelab-svc-02'
      tags: [postgres]
      changed_when: true

    # ── PostgreSQL backup (homelab-edge: Infisical + Semaphore DBs) ───────────
    # Each DB has its own dedicated Postgres container with no host bind mount
    # for backups (deliberately — keeps the secret-holding containers' filesystem
    # surface minimal). Stream pg_dump straight through gzip into postgres_backup_dir
    # instead, so nothing ever needs to be written inside the container.
    - name: "Backup | Postgres | Ensure backup dir exists (edge)"
      ansible.builtin.file:
        path: "{{ postgres_backup_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0700"
      when:
        - inventory_hostname == 'homelab-edge'
        - postgres_backup_dir is defined
      tags: [postgres]

    - name: "Backup | Postgres | Dump and compress Infisical database (edge)"
      ansible.builtin.shell:
        cmd: >
          set -o pipefail &&
          docker exec infisical-db pg_dump -U infisical infisical
          | gzip -f > {{ postgres_backup_dir }}/infisical_{{ backup_timestamp }}.sql.gz
        executable: /bin/bash
      when: inventory_hostname == 'homelab-edge'
      tags: [postgres]
      changed_when: true
      no_log: true   # Suppress output (may contain connection strings)

    - name: "Backup | Postgres | Dump and compress Semaphore database (edge)"
      ansible.builtin.shell:
        cmd: >
          set -o pipefail &&
          docker exec semaphore-db pg_dump -U semaphore semaphore
          | gzip -f > {{ postgres_backup_dir }}/semaphore_{{ backup_timestamp }}.sql.gz
        executable: /bin/bash
      when: inventory_hostname == 'homelab-edge'
      tags: [postgres]
      changed_when: true
      no_log: true

    # ── Cleanup old backups ───────────────────────────────────────────────────
    - name: "Backup | Cleanup | Remove backups older than {{ backup_retain_days }} days"
      ansible.builtin.find:
        paths: "{{ postgres_backup_dir }}"
        patterns: "*.sql.gz"
        age: "{{ backup_retain_days }}d"
        age_stamp: mtime
      register: old_backups
      when: postgres_backup_dir is defined
      tags: [cleanup]

    - name: "Backup | Cleanup | Delete old backup files"
      ansible.builtin.file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_backups.files | default([]) }}"
      when: postgres_backup_dir is defined
      tags: [cleanup]

    - name: "Meta | Backup summary"
      ansible.builtin.debug:
        msg: "Backup complete on {{ inventory_hostname }} — {{ backup_timestamp }}"