version: "3.9"

services:
  camunda-orchestration:
    image: camunda/camunda:8.8.0
    container_name: camunda-orchestration
    restart: unless-stopped
    depends_on:
      - elasticsearch
    env_file:
      - ./camunda/.env
      - ./camunda/.env.secrets
    ports:
      - "8088:8088"
    networks:
      - mgmt_net
      - greentechhub_net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.2
    container_name: camunda-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - camunda_es_data:/usr/share/elasticsearch/data
    networks:
      - mgmt_net

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    env_file:
      - ./n8n/.env
      - ./n8n/.env.secrets
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - mgmt_net
      - noti_net

  discord-gateway:
    build: ./discord-gateway
    container_name: discord-gateway
    restart: unless-stopped
    env_file:
      - ./discord-gateway/.env
      - ./discord-gateway/.env.secrets
    volumes:
      - ./discord-gateway/data:/app/data
    networks:
      - mgmt_net
      - noti_net

  portainer-agent:
    image: portainer/agent:latest
    container_name: portainer-agent
    restart: unless-stopped
    ports:
      - "9001:9001"   # Portainer Server on homelab-observe connects here
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    networks:
      - mgmt_net

networks:
  mgmt_net:
    driver: bridge
  noti_net:
    driver: bridge
  greentechhub_net:
    external: true
    name: greentechhub_network

volumes:
  camunda_es_data: {}
  n8n_data: {}
