---
# roles/tailscale/tasks/main.yml

- name: "Tailscale | Add apt signing key"
  ansible.builtin.shell:
    cmd: |
      curl -fsSL https://pkgs.tailscale.com/stable/raspbian/bookworm.noarmor.gpg \
        | tee /usr/share/keyrings/tailscale-archive-keyring.gpg > /dev/null
    creates: /usr/share/keyrings/tailscale-archive-keyring.gpg
  tags: [tailscale, install]

- name: "Tailscale | Add apt repository"
  ansible.builtin.apt_repository:
    repo: >
      deb [signed-by=/usr/share/keyrings/tailscale-archive-keyring.gpg]
      https://pkgs.tailscale.com/stable/raspbian bookworm main
    filename: tailscale
    state: present
  tags: [tailscale, install]

- name: "Tailscale | Install"
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true
  tags: [tailscale, install]

- name: "Tailscale | Enable and start daemon"
  ansible.builtin.systemd:
    name: tailscaled
    enabled: true
    state: started
  tags: [tailscale]

- name: "Tailscale | Check if already connected"
  ansible.builtin.command: tailscale status
  register: ts_status
  changed_when: false
  failed_when: false
  tags: [tailscale]

- name: "Tailscale | Exchange client credentials for access token"
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/oauth/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: "client_credentials"
      client_id: "{{ vault_tailscale_oauth_client_id }}"
      client_secret: "{{ vault_tailscale_oauth_client_secret }}"
    status_code: 200
  register: ts_token_result
  no_log: true
  when:
    - tailscale_up
    - ts_status.rc != 0
  tags: [tailscale]

- name: "Tailscale | Mint auth key via OAuth access token"
  ansible.builtin.uri:
    url: "https://api.tailscale.com/api/v2/tailnet/-/keys"
    method: POST
    headers:
      Authorization: "Bearer {{ ts_token_result.json.access_token }}"
    body_format: json
    body:
      capabilities:
        devices:
          create:
            reusable: true
            ephemeral: false
            preauthorized: true
            tags: "{{ tailscale_tags }}"
      expirySeconds: 0
    status_code: 200
  register: ts_key_result
  no_log: true
  when:
    - tailscale_up
    - ts_status.rc != 0
  tags: [tailscale]

- name: "Tailscale | Authenticate and bring up"
  ansible.builtin.command:
    cmd: >
      tailscale up
      --authkey={{ ts_key_result.json.key }}
      {% if tailscale_advertise_routes | length > 0 %}
      --advertise-routes={{ tailscale_advertise_routes | join(',') }}
      {% endif %}
      {% if tailscale_accept_routes %}--accept-routes{% endif %}
      {% if tailscale_exit_node %}--advertise-exit-node{% endif %}
      {{ tailscale_extra_args }}
  when:
    - tailscale_up
    - ts_status.rc != 0
  changed_when: true
  no_log: true
  tags: [tailscale]

- name: "Tailscale | Enable IP forwarding (subnet router)"
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    state: present
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
  when: tailscale_advertise_routes | length > 0
  tags: [tailscale]