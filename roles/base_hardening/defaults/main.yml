---
# roles/base_hardening/defaults/main.yml
# Lowest-precedence defaults — override via group_vars/all/main.yml.

# ── Packages ──────────────────────────────────────────────────────────────────
base_packages:
  - curl
  - git
  - htop
  - vim
  - python3
  - python3-pip
  - unattended-upgrades
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release

unattended_upgrades_enabled: true

# ── Time / Locale ─────────────────────────────────────────────────────────────
timezone: "UTC"
locale: "en_US.UTF-8"

# ── SSH hardening ─────────────────────────────────────────────────────────────
ssh_port: 22
ssh_old_port: "{{ ssh_port }}"   # set to current port when migrating; default = no migration
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_pubkey_authentication: "yes"
ssh_max_auth_tries: 3
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2

# ── Notifications ─────────────────────────────────────────────────────────────
notify_script_dir: /usr/local/lib/homelab/notify
# notify_ntfy_url, notify_ntfy_token, notify_discord_webhook have no safe defaults
# (they require vault vars and ip_observe) — must be set in group_vars/all/main.yml.
