---
# roles/base_hardening/tasks/main.yml

- name: "Base | Update apt cache"
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: "Base | Upgrade installed packages"
  ansible.builtin.apt:
    upgrade: dist
  tags: [packages]

- name: "Base | Install base packages"
  ansible.builtin.apt:
    name: "{{ base_packages + ['rsyslog', 'logrotate', 'chrony', 'auditd', 'ufw'] }}"
    state: present
  tags: [packages]

- name: "Base | Set timezone"
  community.general.timezone:
    name: "{{ timezone }}"
  notify: Restart chrony
  tags: [time]

- name: "Base | Enable chrony (NTP)"
  ansible.builtin.systemd:
    name: chrony
    enabled: true
    state: started
  tags: [time]

- name: "Base | Configure unattended upgrades"
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "{{ '1' if unattended_upgrades_enabled else '0' }}";
      APT::Periodic::AutocleanInterval "7";
  tags: [updates]

# Probe the target port first. If sshd is already listening there, skip the
# port-change task entirely — safe for Phase 2 re-runs and idempotent bootstraps.
- name: "Security | Probe target SSH port {{ ssh_port }}"
  ansible.builtin.wait_for:
    port: "{{ ssh_port }}"
    host: "{{ ansible_host | default(inventory_hostname) }}"
    state: started
    timeout: 3
  delegate_to: localhost
  become: false
  register: _ssh_port_probe
  ignore_errors: true
  changed_when: false
  tags: [ssh, security]

- name: "Security | Harden SSH config"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    backup: true
    validate: "sshd -t -f %s"
  loop:
    - { regexp: '^#?PermitRootLogin',              line: "PermitRootLogin {{ ssh_permit_root_login }}" }
    - { regexp: '^#?PasswordAuthentication',        line: "PasswordAuthentication {{ ssh_password_authentication }}" }
    - { regexp: '^#?PubkeyAuthentication',          line: "PubkeyAuthentication {{ ssh_pubkey_authentication }}" }
    - { regexp: '^#?ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication no' }
    - { regexp: '^#?UsePAM',                       line: 'UsePAM yes' }
    - { regexp: '^#?X11Forwarding',                line: 'X11Forwarding no' }
    - { regexp: '^#?MaxAuthTries',                 line: "MaxAuthTries {{ ssh_max_auth_tries }}" }
    - { regexp: '^#?ClientAliveInterval',          line: "ClientAliveInterval {{ ssh_client_alive_interval }}" }
    - { regexp: '^#?ClientAliveCountMax',          line: "ClientAliveCountMax {{ ssh_client_alive_count_max }}" }
  register: sshd_config
  tags: [ssh, security]

# Skipped when probe succeeded (sshd already on target port).
- name: "Security | Update SSH port in sshd_config"
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?Port'
    line: "Port {{ ssh_port }}"
    state: present
    backup: true
    validate: "sshd -t -f %s"
  register: _sshd_port_config
  when: _ssh_port_probe is failed
  tags: [ssh, security]

# Restart sshd in the background over the current SSH session.
# Avoids reconnecting before sshd starts listening on the new port.
- name: "Security | Restart sshd to apply config changes (async, non-blocking)"
  ansible.builtin.systemd:
    name: ssh
    state: restarted
  async: 30
  poll: 0
  when: sshd_config.changed or (_sshd_port_config.changed | default(false))
  tags: [ssh, security]

# Check from the controller that sshd is listening on the target port.
- name: "Security | Wait for sshd on {{ ssh_port }}"
  ansible.builtin.wait_for:
    port: "{{ ssh_port }}"
    host: "{{ ansible_host | default(inventory_hostname) }}"
    state: started
    delay: 5
    timeout: 60
  delegate_to: localhost
  become: false
  when: sshd_config.changed or (_sshd_port_config.changed | default(false))
  tags: [ssh, security]

# Update Ansible to use the new SSH port for remaining tasks.
- name: "Security | Persist new SSH port for subsequent Ansible connections"
  ansible.builtin.set_fact:
    ansible_port: "{{ ssh_port }}"
  vars:
    ansible_port: "{{ ssh_port }}"
  tags: [ssh, security]

- name: "Security | Apply kernel hardening sysctls"
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: true
  loop:
    - { name: net.ipv4.conf.all.accept_redirects,     value: "0" }
    - { name: net.ipv4.conf.default.accept_redirects, value: "0" }
    - { name: net.ipv4.conf.all.send_redirects,       value: "0" }
    - { name: net.ipv4.conf.all.accept_source_route,  value: "0" }
    - { name: net.ipv4.tcp_syncookies,                value: "1" }
    - { name: kernel.dmesg_restrict,                  value: "1" }
  tags: [security, kernel]

- name: "Security | Enable auditd"
  ansible.builtin.systemd:
    name: auditd
    enabled: true
    state: started
  tags: [security, audit]

# ── Notifications ─────────────────────────────────────────────────────────────

- name: "Notify | Create script directory"
  ansible.builtin.file:
    path: "{{ notify_script_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [notify]

- name: "Notify | Deploy notification scripts"
  ansible.builtin.template:
    src: "notify/{{ item }}.sh.j2"
    dest: "{{ notify_script_dir }}/{{ item }}.sh"
    owner: root
    group: root
    mode: "0700"
  loop:
    - on-boot
    - on-shutdown
    - on-ssh-success
  tags: [notify]

- name: "Notify | Deploy systemd service units"
  ansible.builtin.template:
    src: "notify/{{ item }}.service.j2"
    dest: "/etc/systemd/system/{{ item }}.service"
    owner: root
    group: root
    mode: "0644"
  loop:
    - on-boot
    - on-shutdown
    - on-ssh-success
  notify: Reload systemd
  tags: [notify]

- name: "Notify | Enable and start notification services"
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - on-boot.service
    - on-shutdown.service
    - on-ssh-success.service
  tags: [notify]