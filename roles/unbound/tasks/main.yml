---
# roles/unbound/tasks/main.yml
# Runs unbound as a host systemd service rather than a Docker container.
# Pi-hole reaches it via host.docker.internal#5335 (extra_hosts in compose).

- name: "Unbound | Install"
  ansible.builtin.apt:
    name: unbound
    state: present
    update_cache: true
  tags: [unbound]

- name: "Unbound | Download root hints"
  ansible.builtin.get_url:
    url: https://www.internic.net/domain/named.root
    dest: "{{ unbound_root_hints }}"
    owner: unbound
    group: unbound
    mode: "0644"
  notify: Restart unbound
  tags: [unbound]

- name: "Unbound | Write config"
  ansible.builtin.template:
    src: unbound.conf.j2
    dest: "{{ unbound_config_dir }}/homelab.conf"
    owner: root
    group: root
    mode: "0644"
  notify: Restart unbound
  tags: [unbound]

- name: "Unbound | Enable and start"
  ansible.builtin.systemd:
    name: unbound
    enabled: true
    state: started
  tags: [unbound]
