---
# roles/observe_services/defaults/main.yml
# Lowest-precedence defaults — override via group_vars/observe.yml.

# ── Paths ─────────────────────────────────────────────────────────────────────
homelab_repo_path: /opt/homelab

# ── Prometheus ────────────────────────────────────────────────────────────────
prometheus_port: 9090
prometheus_retention: "30d"
prometheus_scrape_interval: "15s"
prometheus_scrape_targets: {}

# ── Loki ──────────────────────────────────────────────────────────────────────
loki_port: 3100
loki_retention: "336h"   # 14 days

# ── Alertmanager ──────────────────────────────────────────────────────────────
alertmanager_port: 9093
alertmanager_receivers: []
alertmanager_routes: []

# ── Grafana ───────────────────────────────────────────────────────────────────
grafana_port: 3000
grafana_admin_user: admin
grafana_allow_signup: false
grafana_datasources: []
# grafana_admin_password has no safe default — must be set via vault_grafana_admin_password

# ── ntfy ──────────────────────────────────────────────────────────────────────
ntfy_port: 8085
# ntfy_base_url and ntfy_config_path reference ip_observe/homelab_repo_path —
# defined in group_vars/observe.yml rather than here to avoid circular expansion.

# ── Uptime Kuma ───────────────────────────────────────────────────────────────
uptime_kuma_port: 3001

# ── Portainer ─────────────────────────────────────────────────────────────────
portainer_port: 9000
portainer_agent_port: 9001
