---
# roles/firewall/tasks/main.yml
# Applies UFW rules additively — no reset, so existing SSH access is never interrupted.
# firewall_rules is passed from the playbook (e.g. firewall_rules: "{{ ufw_rules }}").

- name: "Firewall | Install ufw and at"
  ansible.builtin.apt:
    name:
      - ufw
      - at
    state: present
  tags: [firewall]

- name: "Firewall | Enable atd service"
  ansible.builtin.systemd:
    name: atd
    enabled: true
    state: started
  tags: [firewall]

# Safety rollback: auto-disables UFW in 5 min if we lose SSH access.
# Cancelled automatically after SSH verification succeeds (see end of this file).
- name: "Firewall | Schedule UFW rollback"
  ansible.builtin.shell: |
    echo "ufw disable" | at now + 5 minutes 2>&1
  register: ufw_rollback
  changed_when: false
  tags: [firewall]

- name: "Firewall | Capture rollback job ID"
  ansible.builtin.set_fact:
    ufw_rollback_job_id: "{{ ufw_rollback.stdout | regex_search('job ([0-9]+)', '\\1') | first }}"
  when: ufw_rollback.stdout is search('job [0-9]+')
  tags: [firewall]

- name: "Firewall | Default deny inbound"
  community.general.ufw:
    direction: incoming
    policy: deny
  tags: [firewall]

- name: "Firewall | Default allow outbound"
  community.general.ufw:
    direction: outgoing
    policy: allow
  tags: [firewall]

- name: "Firewall | Allow loopback"
  community.general.ufw:
    rule: allow
    interface: lo
    direction: in
  tags: [firewall]

# Migration safety net — keeps the old SSH port open alongside the new one so a
# botched port change can't lock you out. No-op when ssh_old_port == ssh_port
# (the default). Set ssh_old_port to the previous port to enable; set
# ssh_old_port_cleanup=true once the new port is confirmed to remove the rule.
- name: "Firewall | Keep old SSH port {{ ssh_old_port }} open during migration"
  community.general.ufw:
    rule: allow
    port: "{{ ssh_old_port | string }}"
    proto: tcp
    comment: "SSH migration safety - remove once {{ ssh_port }} confirmed"
  when: ssh_old_port | int != ssh_port | int and not (ssh_old_port_cleanup | bool)
  tags: [firewall]

- name: "Firewall | Remove old SSH port {{ ssh_old_port }} rule"
  community.general.ufw:
    rule: allow
    port: "{{ ssh_old_port | string }}"
    proto: tcp
    delete: true
  when: ssh_old_port | int != ssh_port | int and ssh_old_port_cleanup | bool
  tags: [firewall]

- name: "Firewall | Allow SSH port"
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port | string }}"
    proto: tcp
    comment: "SSH"
  tags: [firewall]

- name: "Firewall | Apply rules"
  community.general.ufw:
    rule: allow
    port: "{{ item.port | string }}"
    proto: "{{ item.proto | default('tcp') }}"
    src: "{{ item.src | default('any') }}"
    comment: "{{ item.comment | default('') }}"
  loop: "{{ firewall_rules | default([]) }}"
  loop_control:
    label: "{{ item.comment | default(item.port) }}"
  when: (item.src | default('any')) != 'EDIT_BEFORE_USE'
  tags: [firewall]

- name: "Firewall | Enable ufw"
  community.general.ufw:
    state: enabled
  tags: [firewall]

- name: "Firewall | Verify SSH reachable on new port"
  ansible.builtin.wait_for:
    host: "{{ ansible_host | default(inventory_hostname) }}"
    port: "{{ ssh_port }}"
    state: started
    timeout: 60
  delegate_to: localhost
  become: false
  tags: [firewall]

- name: "Firewall | Cancel UFW rollback"
  ansible.builtin.command: "atrm {{ ufw_rollback_job_id }}"
  changed_when: false
  when: ufw_rollback_job_id is defined
  tags: [firewall]
