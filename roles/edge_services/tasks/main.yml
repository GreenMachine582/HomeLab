---
# roles/edge_services/tasks/main.yml
# Prepares config files for the docker-compose.edge.yml stack.
# The actual `docker compose up` is run in the playbook post_tasks.

# ── Cloudflare Tunnel ─────────────────────────────────────────────────────────
- name: "Edge | cloudflared | Ensure config dir exists"
  ansible.builtin.file:
    path: "{{ homelab_repo_path }}/cloudflared"
    state: directory
    owner: homelab
    group: homelab
    mode: "0750"
  tags: [cloudflared]

- name: "Edge | cloudflared | Write tunnel config"
  ansible.builtin.template:
    src: cloudflared/config.yml.j2
    dest: "{{ homelab_repo_path }}/cloudflared/config.yml"
    owner: homelab
    group: homelab
    mode: "0640"
  tags: [cloudflared]

# ── Pi-hole ───────────────────────────────────────────────────────────────────
- name: "Edge | Pi-hole | Ensure data dirs exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ homelab_repo_path }}/pihole/etc-pihole"
    - "{{ homelab_repo_path }}/pihole/etc-dnsmasq.d"
  tags: [pihole]

- name: "Edge | Pi-hole | Write custom DNS list"
  ansible.builtin.template:
    src: pihole/custom.list.j2
    dest: "{{ homelab_repo_path }}/pihole/etc-pihole/custom.list"
    owner: root
    group: root
    mode: "0644"
  tags: [pihole]

# ── Unbound ───────────────────────────────────────────────────────────────────
- name: "Edge | Unbound | Ensure config dir exists"
  ansible.builtin.file:
    path: "{{ homelab_repo_path }}/unbound"
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags: [pihole, unbound]

# ── Caddy ─────────────────────────────────────────────────────────────────────
- name: "Edge | Caddy | Ensure config dir exists"
  ansible.builtin.file:
    path: "{{ homelab_repo_path }}/caddy"
    state: directory
    owner: homelab
    group: homelab
    mode: "0750"
  tags: [caddy]

- name: "Edge | Caddy | Render Caddyfile"
  ansible.builtin.template:
    src: caddy/Caddyfile.j2
    dest: "{{ homelab_repo_path }}/caddy/Caddyfile"
    owner: homelab
    group: homelab
    mode: "0640"
  tags: [caddy]