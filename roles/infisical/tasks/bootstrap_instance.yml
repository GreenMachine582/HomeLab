---
# roles/infisical/tasks/bootstrap_instance.yml
# Fully provisions a fresh Infisical instance via its REST API — org + admin
# account + "homelab" project + "production" environment + the application
# folders + the read-only runtime machine identity — AND seeds every
# application secret from vault.yml into it, all in one pass: zero manual UI
# steps, zero manual copy-paste. Included by bootstrap_edge.yml, on the edge
# node itself, before the firewall role runs (so 127.0.0.1:8222 is reachable).
#
# Call via `include_role: { name: infisical, tasks_from: bootstrap_instance.yml }`
# (not include_tasks) — same rule as lookup.yml — so the role's defaults
# (infisical_seed_organization_name, infisical_seed_folders,
# infisical_seed_identities, infisical_runtime_auth_path, ...) load alongside it.
#
# ── Why this is gated on infisical_runtime_auth_path, not the bootstrap call ──
# POST /v1/admin/bootstrap (https://infisical.com/docs/self-hosting/guides/automated-bootstrapping)
# is a one-shot, unauthenticated "Programmatic Provisioning" endpoint: called
# against a fresh instance it creates the admin account AND the organization
# AND hands back an instance-admin Bearer token in a single response — a 200
# unambiguously means "fresh instance, go ahead and provision and seed
# everything". BUT — contrary to this task's original assumption (see the old
# ⚠️ below) — it does NOT cleanly reject a second call against an
# already-initialised instance with 400/401/403/409. Live-tested against the
# deployed image: it resets the connection instead (status -1, "Connection
# reset by peer", elapsed=0) — completely indistinguishable, at the HTTP
# layer, from "fresh instance whose backend isn't ready to serve yet".
#
# So the entire provisioning pass is gated on infisical_runtime_auth_path's
# existence FIRST, before ever calling the bootstrap endpoint at all: a
# durable, on-disk marker written (see the dedicated task below, run the
# moment the values exist) the instant a previous run minted the "runtime"
# identity's credentials — i.e. the moment re-running bootstrap would start
# conflicting with already-created resources. Only when that file is absent
# do we attempt the call (still with retries — now safely scoped to a
# situation where -1 can only mean "give it more time," never "already
# initialised and crashing"). A 200 there still means "go ahead and provision
# everything": a successful bootstrap response guarantees an empty
# project/folder/identity space to provision into. (The application-secret
# seed below stays additive/create-if-absent regardless — same as the old
# seed.yml — in case secrets were hand-added via the UI between runs.)
#
# ── Why there's no persisted "bootstrap" [write] identity any more ───────────
# The instance-admin token this task extracts from the one-shot bootstrap
# response (_infisical_admin_token) already has MORE access than any
# project-scoped "admin"-role machine identity could — it can create the
# project, folders, AND push every application secret immediately, in this
# same play, while it's already in hand. Minting a separate persisted
# "bootstrap" identity just to redo the same work a moment later — then
# printing its credentials for an operator to copy into vault.yml, then
# remembering to revoke it afterwards — would be pure ceremony with a
# meaningfully larger blast radius (a long-lived, write-everything credential
# sitting in an encrypted file). So the seed happens here, inline, using this
# one-shot token directly, and only the "runtime" identity — read-only,
# used by Phase 2+ Ansible runs and Semaphore, neither of which should ever
# hold write access to every secret — gets created, persisted, and written
# straight to a node-local file. Nothing to print, copy, round-trip through
# vault.yml, or remember to revoke.
#
# This is what makes #39's original "only the org+admin step is inherently
# manual" framing obsolete — and what makes the old Part 1/Part 2 split itself
# unnecessary (see bootstrap_edge.yml): Infisical ends this task fully
# provisioned, fully seeded, and with Semaphore's runtime credentials already
# sitting in the node-local file it reads from — all in one pass, with no
# checkpoint of any kind in between.
#
# Runs directly on the edge node — NOT delegated to localhost (unlike the old,
# now-deleted seed.yml's Part 2 calls). infisical_api_url is
# http://127.0.0.1:8222/api: the edge node's own loopback, where Infisical's
# container publishes its port, and that address only resolves correctly from
# the edge node itself. become: false matches the sibling "Wait for the API
# port to accept connections" task: these are unauthenticated/Bearer-token
# HTTP calls to a loopback port and need no elevated privileges.
#
# Also writes the freshly-minted runtime identity credentials straight to
# infisical_runtime_auth_path (see the dedicated task below) — bypassing
# vault.yml entirely for that node-local file, which Semaphore now reads
# directly too (roles/semaphore/tasks/main.yml). This task runs immediately
# after the runtime identity is created — the first point at which its real
# values exist — so this is the definitive write of that file's real content.
#
# ⚠️  Verify EVERY endpoint path/payload/response-field below against the
# deployed Infisical version's API reference before first run — none of this
# can be exercised without a live, freshly-initialised instance, and the API
# has moved across releases (the old seed.yml carried the same caveat for its
# routes — now folded into this file). Specifically check:
# identity.credentials.token's exact field path, the project/environment/
# folder/identity/secret creation routes, and the project role slug ("viewer"
# — confirm it exists and grants the intended read-only scope). (The bootstrap
# endpoint's behaviour on a second call is no longer an open question — see
# "Why this is gated on infisical_runtime_auth_path" above; it's now
# live-verified, which is exactly why the gate no longer depends on it.)

- name: "Infisical bootstrap | Check whether runtime credentials already exist (durable already-bootstrapped marker)"
  ansible.builtin.stat:
    path: "{{ infisical_runtime_auth_path }}"
  register: _infisical_runtime_auth_stat
  become: true
  become_user: "{{ infisical_service_user }}"
  tags: [infisical, bootstrap]

- name: "Infisical bootstrap | SKIPPED — runtime credentials already exist (instance already bootstrapped)"
  ansible.builtin.debug:
    msg: >-
      Skipping instance bootstrap: {{ infisical_runtime_auth_path }} already
      exists on this node — the durable, on-disk proof that a previous run
      already minted the "runtime" identity (and, by construction of this
      one-shot pass, provisioned everything up to that point: org, admin,
      project, environment, folders, identity). We check this file FIRST,
      before ever calling POST /v1/admin/bootstrap again, because that
      endpoint doesn't cleanly reject second attempts on this Infisical
      version — it resets the connection instead (status -1), which is
      indistinguishable at the HTTP layer from "still starting up" (see the
      header comment "Why this is gated on infisical_runtime_auth_path").
      Re-attempting it here would only risk crashing the container for no
      benefit. Nothing left to do — Semaphore and Phase 2+ Ansible runs are
      reading their credentials from this file right now. Adding a brand-new
      application secret later doesn't need a re-run of this task — add it
      directly via the Infisical UI instead (see TROUBLESHOOTING.md
      "Bootstrap playbook reports Infisical already initialised"). If you've
      wiped Infisical's volumes and need to re-provision from scratch, you
      must ALSO remove this file first — `rm {{ infisical_runtime_auth_path }}`
      as {{ infisical_service_user }} on the node — otherwise this check
      keeps skipping against the new, empty instance.
  when: _infisical_runtime_auth_stat.stat.exists
  tags: [infisical, bootstrap]

- name: "Infisical bootstrap | Attempt one-shot instance bootstrap (org + admin + token)"
  ansible.builtin.uri:
    url: "{{ infisical_api_url }}/v1/admin/bootstrap"
    method: POST
    body_format: json
    body:
      email: "{{ vault_infisical_admin_email }}"
      password: "{{ vault_infisical_admin_password }}"
      organization: "{{ infisical_seed_organization_name }}"
    status_code: [200, 400, 401, 403, 409]
  register: _infisical_bootstrap_result
  # Retry until a DEFINITIVE response arrives. On a Raspberry Pi, Infisical
  # may respond with 5xx transiently while its backend (Postgres, Redis) is
  # still initialising — those are indistinguishable from "still starting up"
  # and must be retried, just like -1 (connection reset). Only stop on the
  # statuses we know how to act on: 200 (fresh — proceed with provisioning)
  # or 400/401/403/409 (already initialised — skip). This task is only ever
  # reached when infisical_runtime_auth_path is absent (see stat above), so
  # neither -1 nor 5xx can mean "already initialised and crashing" here.
  until: (_infisical_bootstrap_result.status | default(-1)) in [200, 400, 401, 403, 409]
  retries: 20
  delay: 6
  failed_when: false
  no_log: true
  become: false
  when: not _infisical_runtime_auth_stat.stat.exists
  tags: [infisical, bootstrap]

- name: "Infisical bootstrap | Determine whether this is a fresh instance"
  ansible.builtin.set_fact:
    _infisical_bootstrap_fresh: "{{ (not _infisical_runtime_auth_stat.stat.exists) and ((_infisical_bootstrap_result.status | default(-1)) == 200) }}"
  tags: [infisical, bootstrap]

- name: "Infisical bootstrap | TEMP DEBUG — show raw bootstrap-call result (not body/json)"
  ansible.builtin.debug:
    msg: "status={{ _infisical_bootstrap_result.status | default('n/a') }} | msg={{ _infisical_bootstrap_result.msg | default('(no msg)') }} | url={{ _infisical_bootstrap_result.url | default('n/a') }} | elapsed={{ _infisical_bootstrap_result.elapsed | default('n/a') }}"
  when:
    - not _infisical_bootstrap_fresh
    - not _infisical_runtime_auth_stat.stat.exists
  no_log: false
  tags: [infisical, bootstrap]

- name: "Infisical bootstrap | SKIPPED — could not reach Infisical's API (transient — not an 'already initialised' signal)"
  ansible.builtin.debug:
    msg: >-
      Skipping instance bootstrap: every attempt to reach
      POST /v1/admin/bootstrap failed at the transport level (status -1 —
      "{{ _infisical_bootstrap_result.msg | default('connection failure') }}"),
      even after retrying. {{ infisical_runtime_auth_path }} does NOT exist
      yet (checked above), so this can only mean "still starting up" — it
      CANNOT mean "already initialised" (that would require the file to
      already be here — see "Why this is gated on infisical_runtime_auth_path"
      in the header). A -1 means the TCP port was open (this task runs after
      "Wait for the API port to accept connections" passes) but Infisical's
      backend never served a real HTTP response — it's still starting up
      (running DB migrations, etc. — self-hosted Infisical can take longer to
      become request-ready than to open its port) or it crashed/restarted.
      Check `docker compose -f docker-compose.edge.yml logs infisical` (and
      infisical-db/infisical-redis) for the real cause, then re-run this
      playbook once it's healthy — re-running is safe and idempotent; nothing
      has been provisioned yet, so there's no "stuck" state and no need to
      wipe any volumes.
  when:
    - not _infisical_bootstrap_fresh
    - not _infisical_runtime_auth_stat.stat.exists
    - (_infisical_bootstrap_result.status | default(-1)) == -1
  tags: [infisical, bootstrap]

- name: "Infisical bootstrap | FAIL — stuck state: instance initialised but runtime credentials missing"
  ansible.builtin.fail:
    msg: >-
      Infisical is already initialised (POST /v1/admin/bootstrap returned
      {{ _infisical_bootstrap_result.status | default('n/a') }}) but
      {{ infisical_runtime_auth_path }} does not exist on this node. A
      previous bootstrap run created the org/admin and then died before
      minting and writing the runtime machine identity. Ansible cannot safely
      provision into a non-empty Infisical instance.

      Recovery (one command, from your PC/WSL):
        ansible-playbook -i inventories/bootstrap.ini playbooks/bootstrap_edge.yml \
          --extra-vars infisical_reset=true

      This stops infisical/infisical-db/infisical-redis, removes their named
      volumes ({{ homelab_repo_path | basename }}_infisical_db_data /
      _infisical_redis_data), removes any stale credentials file, then
      re-provisions everything in one pass against the now-empty instance.
      /opt/infisical/.env is preserved — its encryption key and DB/Redis
      passwords carry over to the fresh Postgres container automatically.
      See docs/TROUBLESHOOTING.md "Bootstrap instance/seed step fails".
  when:
    - not _infisical_bootstrap_fresh
    - not _infisical_runtime_auth_stat.stat.exists
    - (_infisical_bootstrap_result.status | default(-1)) != -1
  tags: [infisical, bootstrap]

- name: "Infisical bootstrap | Provision org, project, environment, folders, and identities"
  when: _infisical_bootstrap_fresh
  no_log: true
  become: false
  tags: [infisical, bootstrap]
  block:
    - name: "Infisical bootstrap | Extract instance-admin token and organization ID"
      ansible.builtin.set_fact:
        _infisical_admin_token: "{{ _infisical_bootstrap_result.json.identity.credentials.token }}"
        _infisical_org_id: "{{ _infisical_bootstrap_result.json.organization.id }}"

    - name: "Infisical bootstrap | Create the {{ infisical_seed_project_slug }} project"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v2/workspace"
        method: POST
        headers:
          Authorization: "Bearer {{ _infisical_admin_token }}"
        body_format: json
        body:
          projectName: "{{ infisical_seed_project_slug }}"
          organizationId: "{{ _infisical_org_id }}"
        status_code: [200, 201]
      register: _infisical_project

    - name: "Infisical bootstrap | TEMP DEBUG — project creation response structure (keys only)"
      ansible.builtin.debug:
        msg: >-
          project top-level keys={{ _infisical_project.json.keys() | list }}
          | nested keys={{ _infisical_project.json[_infisical_project.json.keys() | list | first].keys() | list
            if _infisical_project.json else 'empty response' }}
      no_log: false
      tags: [infisical, bootstrap, debug]

    - name: "Infisical bootstrap | Capture project ID and slug"
      ansible.builtin.set_fact:
        _infisical_project_id:   "{{ _infisical_project.json.project.id   | default(_infisical_project.json.workspace.id) }}"
        _infisical_project_slug: "{{ _infisical_project.json.project.slug | default(_infisical_project.json.workspace.slug | default(infisical_seed_project_slug)) }}"

    - name: "Infisical bootstrap | Create application secret folders"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v1/folders"
        method: POST
        headers:
          Authorization: "Bearer {{ _infisical_admin_token }}"
        body_format: json
        body:
          workspaceId: "{{ _infisical_project_id }}"
          environment: "{{ infisical_seed_environment }}"
          name: "{{ item }}"
          path: /
        status_code: [200, 201]
      loop: "{{ infisical_seed_folders }}"
      loop_control:
        label: "/{{ item }}"

    - name: "Infisical bootstrap | Create machine identities"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v1/identities"
        method: POST
        headers:
          Authorization: "Bearer {{ _infisical_admin_token }}"
        body_format: json
        body:
          name: "{{ item.name }}"
          organizationId: "{{ _infisical_org_id }}"
        status_code: [200, 201]
      loop: "{{ infisical_seed_identities }}"
      loop_control:
        label: "{{ item.name }}"
      register: _infisical_identities

    - name: "Infisical bootstrap | Attach Universal Auth to each identity"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v1/auth/universal-auth/identities/{{ item.json.identity.id }}"
        method: POST
        headers:
          Authorization: "Bearer {{ _infisical_admin_token }}"
        body_format: json
        body:
          clientSecretTrustedIps: [{ ipAddress: "0.0.0.0/0" }]
          accessTokenTrustedIps: [{ ipAddress: "0.0.0.0/0" }]
          accessTokenTTL: 2592000
          accessTokenMaxTTL: 2592000
        status_code: [200, 201]
      loop: "{{ _infisical_identities.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      register: _infisical_universal_auth

    - name: "Infisical bootstrap | TEMP DEBUG — Universal Auth response structure (keys only, no values)"
      ansible.builtin.debug:
        msg: >-
          UA top-level keys={{ _infisical_universal_auth.results[0].json.keys() | list }}
          | identityUniversalAuth keys={{ _infisical_universal_auth.results[0].json.identityUniversalAuth.keys() | list
            if 'identityUniversalAuth' in _infisical_universal_auth.results[0].json else 'KEY MISSING — update clientId path' }}
      no_log: false
      tags: [infisical, bootstrap, debug]

    - name: "Infisical bootstrap | Generate a client secret for each identity"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v1/auth/universal-auth/identities/{{ item.json.identity.id }}/client-secrets"
        method: POST
        headers:
          Authorization: "Bearer {{ _infisical_admin_token }}"
        body_format: json
        body:
          description: "Provisioned by bootstrap_edge.yml (#39 — instance bootstrap)"
          numUsesLimit: 0
        status_code: [200, 201]
      loop: "{{ _infisical_identities.results }}"
      loop_control:
        label: "{{ item.item.name }}"
      register: _infisical_client_secrets

    - name: "Infisical bootstrap | Write runtime lookup credentials from freshly-minted values"
      ansible.builtin.template:
        src: runtime_auth.yml.j2
        dest: "{{ infisical_runtime_auth_path }}"
        owner: "{{ infisical_service_user }}"
        group: "{{ infisical_service_user }}"
        mode: "0600"
      become: true
      vars:
        _runtime_client_id:     "{{ _infisical_universal_auth.results[0].json.identityUniversalAuth.clientId }}"
        _runtime_client_secret: "{{ _infisical_client_secrets.results[0].json.clientSecret }}"
        _runtime_project_id:    "{{ _infisical_project_id }}"
        _runtime_project_slug:  "{{ _infisical_project_slug }}"

    - name: "Infisical bootstrap | Grant each identity access to the project"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v2/workspace/{{ _infisical_project_id }}/identity-memberships/{{ item.json.identity.id }}"
        method: POST
        headers:
          Authorization: "Bearer {{ _infisical_admin_token }}"
        body_format: json
        body:
          role: "{{ item.item.role }}"
        status_code: [200, 201]
      loop: "{{ _infisical_identities.results }}"
      loop_control:
        label: "{{ item.item.name }} ({{ item.item.role }})"

    # ── Application-secret seed (formerly roles/infisical/tasks/seed.yml) ────
    # Folded in here because _infisical_admin_token already has full write
    # access — see the header's "no persisted bootstrap identity" rationale.
    # Same map, same additive create-if-absent GET-then-POST pattern, same
    # idempotency guarantee (existing keys are never overwritten/rotated/
    # deleted) — just authenticated with this one-shot token instead of a
    # separately-provisioned, separately-authenticated machine identity.
    - name: "Infisical bootstrap | Build the vault_<service>_<field> -> /production/<folder>/<KEY> map"
      ansible.builtin.set_fact:
        _infisical_seed_map:
          cloudflare/TUNNEL_ID: "{{ vault_cloudflare_tunnel_id }}"
          cloudflare/TUNNEL_TOKEN: "{{ vault_cloudflare_tunnel_token }}"
          cloudflare/API_TOKEN: "{{ vault_cloudflare_api_token }}"
          pihole/WEB_PASSWORD: "{{ vault_pihole_web_password }}"
          grafana/ADMIN_PASSWORD: "{{ vault_grafana_admin_password }}"
          discord/WEBHOOK_CRITICAL: "{{ vault_discord_webhook_critical }}"
          discord/WEBHOOK_WARNING: "{{ vault_discord_webhook_warning }}"
          discord/WEBHOOK_INFO: "{{ vault_discord_webhook_info }}"
          discord/ALERTS_WEBHOOK: "{{ vault_discord_alerts_webhook }}"
          discord/PUBLIC_KEY: "{{ vault_discord_public_key }}"
          ntfy/TOKEN: "{{ vault_ntfy_token }}"
          camunda/DB_USER: "{{ vault_camunda_db_user }}"
          camunda/DB_PASSWORD: "{{ vault_camunda_db_password }}"
          camunda/ADMIN_USER: "{{ vault_camunda_admin_user }}"
          camunda/ADMIN_PASSWORD: "{{ vault_camunda_admin_password }}"
          camunda/LICENSE_KEY: "{{ vault_camunda_license_key }}"
          n8n/USER: "{{ vault_n8n_user }}"
          n8n/PASSWORD: "{{ vault_n8n_password }}"
          n8n/OWNER_EMAIL: "{{ vault_n8n_owner_email }}"
          n8n/OWNER_PASSWORD: "{{ vault_n8n_owner_password }}"
          n8n/ENCRYPTION_KEY: "{{ vault_n8n_encryption_key }}"
          n8n/WEBHOOK_SECRET: "{{ vault_n8n_webhook_secret }}"
          greentechhub/DB_USER: "{{ vault_greentechhub_db_user }}"
          greentechhub/DB_PASSWORD: "{{ vault_greentechhub_db_password }}"
          greentechhub/DJANGO_SECRET_KEY: "{{ vault_django_secret_key }}"
          deploy/WEBHOOK_SECRET: "{{ vault_deploy_webhook_secret }}"
          deploy/GITHUB_PAT: "{{ vault_github_pat }}"
          network/IP_EDGE:            "{{ vault_network_ip_edge    | default(ip_edge) }}"
          network/IP_OBSERVE:         "{{ vault_network_ip_observe | default(ip_observe) }}"
          network/IP_SVC_01:          "{{ vault_network_ip_svc_01  | default(ip_svc_01) }}"
          network/IP_SVC_02:          "{{ vault_network_ip_svc_02  | default(ip_svc_02) }}"
          network/IP_SVC_03:          "{{ vault_network_ip_svc_03  | default(ip_svc_03) }}"
          network/TAILSCALE_IP_OBSERVE: "{{ tailscale_ip_observe }}"
          network/TAILSCALE_IP_SVC_01:  "{{ tailscale_ip_svc_01 }}"
          network/TAILSCALE_IP_SVC_02:  "{{ tailscale_ip_svc_02 }}"
          network/TAILSCALE_IP_SVC_03:  "{{ tailscale_ip_svc_03 }}"
          network/TAILNET:              "{{ tailscale_tailnet }}"
          network/SSH_ADMIN_PUBKEY:   "{{ vault_admin_ssh_pubkey }}"
          network/SSH_HOMELAB_PUBKEY: "{{ vault_homelab_ssh_pubkey }}"
          network/SSH_DEPLOY_PUBKEY:  "{{ vault_deploy_ssh_pubkey }}"
          tailscale/OAUTH_CLIENT_ID:     "{{ vault_tailscale_oauth_client_id }}"
          tailscale/OAUTH_CLIENT_SECRET: "{{ vault_tailscale_oauth_client_secret }}"
          semaphore/ADMIN_USER:     "{{ vault_semaphore_admin_user }}"
          semaphore/ADMIN_PASSWORD: "{{ vault_semaphore_admin_password }}"
          observe/UPTIME_KUMA_ADMIN_USER:     "{{ vault_uptime_kuma_admin_user }}"
          observe/UPTIME_KUMA_ADMIN_PASSWORD: "{{ vault_uptime_kuma_admin_password }}"

    - name: "Infisical bootstrap | Check which application-secret keys already exist"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v3/secrets/raw/{{ item.key | basename }}?workspaceId={{ _infisical_project_id }}&environment={{ infisical_seed_environment }}&secretPath=/{{ item.key | dirname }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _infisical_admin_token }}"
        status_code: [200, 404]
      loop: "{{ _infisical_seed_map | dict2items(key_name='key', value_name='value') }}"
      loop_control:
        label: "/production/{{ item.key }}"
      register: _infisical_seed_existing

    - name: "Infisical bootstrap | Create only the application-secret keys that don't exist yet (additive)"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v3/secrets/raw/{{ item.item.key | basename }}"
        method: POST
        headers:
          Authorization: "Bearer {{ _infisical_admin_token }}"
        body_format: json
        body:
          projectSlug: "{{ _infisical_project_slug }}"
          environment: "{{ infisical_seed_environment }}"
          secretPath: "/{{ item.item.key | dirname }}"
          secretValue: "{{ item.item.value }}"
        status_code: [200, 201]
      loop: "{{ _infisical_seed_existing.results }}"
      loop_control:
        label: "/production/{{ item.item.key }}"
      when: item.status == 404
      register: _infisical_seed_create_DEBUG  # TEMP — diagnostic, remove with the debug task below once root-caused
      failed_when: false

    # TEMP DEBUG — surfaces ONLY status/msg/url (never `body`/`secretValue`/the
    # bearer token, none of which are referenced here) so the real rejection
    # reason is visible without leaking application secrets or the admin token
    # into the log. Remove this task and the `register`/`failed_when` above
    # once the create-secret failure is root-caused.
    - name: "Infisical bootstrap | TEMP DEBUG — show create-secret status/msg (not body/values)"
      ansible.builtin.debug:
        msg: "{{ item.item.item.key }} -> status={{ item.status | default('n/a') }} | projectSlug={{ _infisical_project_slug }} | error={{ item.json.error | default('') }} | message={{ item.json.message | default(item.msg | default('(no msg)')) }} | url={{ item.url | default('n/a') }}"
      loop: "{{ _infisical_seed_create_DEBUG.results }}"
      loop_control:
        label: "{{ item.item.item.key | default('?') }}"
      when: item.skipped is not defined or not item.skipped
      no_log: false

    - name: "Infisical bootstrap | Summary"
      ansible.builtin.debug:
        msg: >-
          Infisical fully provisioned AND seeded — nothing left to copy or click.
          Org "{{ infisical_seed_organization_name }}", project
          "{{ infisical_seed_project_slug }}", environment
          "{{ infisical_seed_environment }}", {{ infisical_seed_folders | length }}
          folders, and the read-only "runtime" machine identity are all in place.
          {{ _infisical_seed_existing.results | selectattr('status', 'equalto', 404) | list | length }}
          application secret(s) were created from vault.yml
          ({{ _infisical_seed_existing.results | selectattr('status', 'equalto', 200) | list | length }}
          already present and left untouched — additive, never overwritten).
          The runtime identity's credentials have already been written to
          {{ infisical_runtime_auth_path }} on this node, so deploy_edge.yml's
          Infisical lookups (Phase 2) and Semaphore (coming up next in this
          same play) both resolve their secrets correctly right now — no
          vault.yml edit, no printed values to paste anywhere, no second pass.
