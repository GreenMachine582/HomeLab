---
# roles/infisical/tasks/seed.yml
# Additive, create-if-absent seed of application secrets from the WSL-local
# vault.yml into Infisical — see the "Secret naming convention" block in
# vault.yml.example for the full vault_<service>_<field> -> /production/<folder>/<KEY>
# mapping reproduced below.
#
# ── Why this is gated, not unconditional ─────────────────────────────────────
# This needs the bootstrap machine identity's Universal Auth credentials
# (vault_infisical_bootstrap_client_id/secret). Those can only be MINTED from
# inside an already-initialised Infisical — org, admin account, project and
# environment created, identity created and granted write access — none of
# which exists on a brand-new instance. That first-run setup is an inherently
# manual, one-time runbook (Infisical's UI/API — see BOOTSTRAP.md "First-run
# Infisical setup"); no amount of Ansible automates a system into having
# created its own credentials before it existed.
#
# So: bootstrap brings Infisical up, and THIS task either seeds it (if the
# identity is already configured — i.e. a second/later run) or skips with
# clear next-step instructions (first run, fresh instance). Re-running
# bootstrap afterwards — or just `--tags infisical,seed` — picks up where it
# left off; nothing here is destructive or order-sensitive beyond that.
#
# Delegated to localhost (the WSL control host running ansible-playbook):
# vault.yml itself never leaves WSL — only the decrypted values it already
# holds in memory cross the wire to Infisical's API.
#
# Idempotent by construction: an existing key is left untouched (no overwrite,
# no rotation, no delete) — only missing keys are created. Re-running only
# ever backfills.
#
# ⚠️  Verify the endpoint paths/payloads below against the deployed Infisical
# version's API reference before first run (Universal Auth login + the v3
# "raw secrets" CRUD routes are assumed here; both have moved across releases).

- name: "Infisical seed | Check whether the bootstrap machine identity has been configured"
  ansible.builtin.set_fact:
    _infisical_seed_ready: >-
      {{ vault_infisical_bootstrap_client_id != 'changeme'
         and vault_infisical_bootstrap_client_secret != 'changeme' }}
  tags: [infisical, seed]

- name: "Infisical seed | SKIPPED — complete first-run Infisical setup, then re-run"
  ansible.builtin.debug:
    msg: >-
      Skipping the seed: vault_infisical_bootstrap_client_id/secret are still
      "changeme" (expected on a fresh instance — these can't exist before
      Infisical does). Infisical is up at http://{{ ansible_host }}:8222 over
      Tailscale. Complete its one-time setup now (see BOOTSTRAP.md "First-run
      Infisical setup": create the org, admin account, "homelab" project, a
      "production" environment, the /camunda /n8n /discord /cloudflare /pihole
      /grafana /ntfy /greentechhub /deploy folders, and the bootstrap [write]
      + runtime [read-only] machine identities). Write the resulting
      vault_infisical_bootstrap_client_*/vault_infisical_runtime_client_*
      values into vault.yml, re-encrypt it, then re-run:
        ansible-playbook -i inventories/bootstrap.ini playbooks/bootstrap_edge.yml --tags infisical,seed,semaphore
  when: not _infisical_seed_ready
  tags: [infisical, seed]

- name: "Infisical seed | Push application secrets (additive, create-if-absent)"
  when: _infisical_seed_ready
  no_log: true
  tags: [infisical, seed]
  block:
    - name: "Infisical seed | Authenticate with the bootstrap machine identity (Universal Auth)"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v1/auth/universal-auth/login"
        method: POST
        body_format: json
        body:
          clientId: "{{ vault_infisical_bootstrap_client_id }}"
          clientSecret: "{{ vault_infisical_bootstrap_client_secret }}"
        status_code: 200
      register: _infisical_seed_auth
      delegate_to: localhost
      become: false

    - name: "Infisical seed | Build the vault_<service>_<field> -> /production/<folder>/<KEY> map"
      ansible.builtin.set_fact:
        _infisical_seed_map:
          cloudflare/TUNNEL_ID: "{{ vault_cloudflare_tunnel_id }}"
          cloudflare/TUNNEL_TOKEN: "{{ vault_cloudflare_tunnel_token }}"
          cloudflare/API_TOKEN: "{{ vault_cloudflare_api_token }}"
          pihole/WEB_PASSWORD: "{{ vault_pihole_web_password }}"
          grafana/ADMIN_PASSWORD: "{{ vault_grafana_admin_password }}"
          discord/WEBHOOK_CRITICAL: "{{ vault_discord_webhook_critical }}"
          discord/WEBHOOK_WARNING: "{{ vault_discord_webhook_warning }}"
          discord/WEBHOOK_INFO: "{{ vault_discord_webhook_info }}"
          discord/ALERTS_WEBHOOK: "{{ vault_discord_alerts_webhook }}"
          discord/PUBLIC_KEY: "{{ vault_discord_public_key }}"
          ntfy/TOKEN: "{{ vault_ntfy_token }}"
          camunda/DB_USER: "{{ vault_camunda_db_user }}"
          camunda/DB_PASSWORD: "{{ vault_camunda_db_password }}"
          camunda/ADMIN_USER: "{{ vault_camunda_admin_user }}"
          camunda/ADMIN_PASSWORD: "{{ vault_camunda_admin_password }}"
          camunda/LICENSE_KEY: "{{ vault_camunda_license_key }}"
          n8n/USER: "{{ vault_n8n_user }}"
          n8n/PASSWORD: "{{ vault_n8n_password }}"
          n8n/OWNER_EMAIL: "{{ vault_n8n_owner_email }}"
          n8n/OWNER_PASSWORD: "{{ vault_n8n_owner_password }}"
          n8n/ENCRYPTION_KEY: "{{ vault_n8n_encryption_key }}"
          n8n/WEBHOOK_SECRET: "{{ vault_n8n_webhook_secret }}"
          greentechhub/DB_USER: "{{ vault_greentechhub_db_user }}"
          greentechhub/DB_PASSWORD: "{{ vault_greentechhub_db_password }}"
          greentechhub/DJANGO_SECRET_KEY: "{{ vault_django_secret_key }}"
          deploy/WEBHOOK_SECRET: "{{ vault_deploy_webhook_secret }}"

    - name: "Infisical seed | Check which keys already exist (read before write — never overwrite)"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v3/secrets/raw/{{ item.key | basename }}?workspaceSlug={{ infisical_seed_project_slug }}&environment={{ infisical_seed_environment }}&secretPath=/{{ item.key | dirname }}"
        method: GET
        headers:
          Authorization: "Bearer {{ _infisical_seed_auth.json.accessToken }}"
        status_code: [200, 404]
      loop: "{{ _infisical_seed_map | dict2items(key_name='key', value_name='value') }}"
      loop_control:
        label: "/production/{{ item.key }}"
      register: _infisical_seed_existing
      delegate_to: localhost
      become: false

    - name: "Infisical seed | Create only the keys that don't exist yet (additive)"
      ansible.builtin.uri:
        url: "{{ infisical_api_url }}/v3/secrets/raw/{{ item.item.key | basename }}"
        method: POST
        headers:
          Authorization: "Bearer {{ _infisical_seed_auth.json.accessToken }}"
        body_format: json
        body:
          workspaceSlug: "{{ infisical_seed_project_slug }}"
          environment: "{{ infisical_seed_environment }}"
          secretPath: "/{{ item.item.key | dirname }}"
          secretValue: "{{ item.item.value }}"
        status_code: 200
      loop: "{{ _infisical_seed_existing.results }}"
      loop_control:
        label: "/production/{{ item.item.key }}"
      when: item.status == 404
      delegate_to: localhost
      become: false

    - name: "Infisical seed | Summary"
      ansible.builtin.debug:
        msg: >-
          Seed complete: {{ _infisical_seed_existing.results | selectattr('status', 'equalto', 404) | list | length }}
          key(s) created, {{ _infisical_seed_existing.results | selectattr('status', 'equalto', 200) | list | length }}
          already present and left untouched.
          Next: disable or revoke the bootstrap machine identity in the Infisical UI
          (Access Control -> Identities) — re-enable it only for a deliberate re-seed.
