---
# roles/infisical/defaults/main.yml
# Lowest-precedence defaults — override via group_vars or host_vars.

# Deliberately OUTSIDE homelab_repo_path — repo git operations (pull, recurse
# ownership fixes, rollback checkouts) must never touch node-generated secrets.
infisical_data_dir: /opt/infisical
infisical_service_user: homelab

# Internal-only — Tailscale-only access is enforced by the firewall (group_vars/edge.yml),
# not by this URL. No public hostname; never added to caddy_routes or cloudflared_ingress.
infisical_site_url: "http://infisical:8080"

infisical_db_user: infisical
infisical_db_name: infisical
infisical_redis_port: 6379

# ── Seed (see tasks/bootstrap_instance.yml and the "Secret naming convention"
# in vault.yml.example) — project/environment slugs the /production/<folder>/<KEY>
# paths are seeded into. (The seed itself runs once, inline, during instance
# bootstrap — using the one-shot call's instance-admin token, not a persisted
# machine identity. See bootstrap_instance.yml's header for why.)
infisical_seed_project_slug: homelab
infisical_seed_environment: prod

# ── Instance bootstrap (see tasks/bootstrap_instance.yml) ───────────────────
# Single source of truth for the org/project/folder/identity shape that
# bootstrap_instance.yml provisions via the REST API on a fresh instance —
# must agree with the "Secret naming convention" block in vault.yml.example
# (folder names feed straight into the seed step's /production/<folder>/<KEY>
# paths and lookup.yml's runtime resolution; a mismatch here breaks both).
infisical_seed_organization_name: homelab

infisical_seed_folders:
  - camunda
  - n8n
  - discord
  - cloudflare
  - pihole
  - grafana
  - ntfy
  - greentechhub
  - deploy
  - network
  - semaphore

# Project role slug — ⚠️ verify against the deployed Infisical version; this is
# a built-in project role name and may differ across releases. read-only:
# Phase 2+ playbooks (and Semaphore) resolve application secrets at runtime —
# nothing else needs a persisted machine identity. The one-time application
# secret seed authenticates with the bootstrap call's own instance-admin token
# (see bootstrap_instance.yml) — nothing to provision, persist, or revoke for it.
infisical_seed_identities:
  - { name: runtime, role: viewer }

# ── Runtime lookups (see tasks/lookup.yml) ──────────────────────────────────
# Where the READ-ONLY runtime identity's Universal Auth credentials are written,
# once, during Phase 1 — so Phase 2+ playbooks running locally on the edge can
# resolve application secrets from Infisical without vault.yml ever being copied
# there. In the homelab user's home dir (not /opt/infisical — that's Infisical's
# OWN operational secrets; this is the credential Ansible itself authenticates
# with, mirroring how it's also injected into Semaphore's .env).
infisical_runtime_auth_path: /home/homelab/.infisical_runtime_auth.yml

# Reachable over loopback on the edge itself — Phase 2+ playbooks run locally
# there (see CLAUDE.md "Phase 2"). Override per-call if looking up from elsewhere.
infisical_runtime_api_url: "http://127.0.0.1:8222/api"
