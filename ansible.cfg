# No vault_password_file here on purpose — this file is cloned to every node,
# but .vault_pass/vault.yml deliberately never leave the WSL/PC control host
# (see CLAUDE.md "Secrets"). A path here would resolve to a file that doesn't
# exist on nodes, and Ansible aborts at startup if a *configured* vault password
# file is missing — even when the playbook needs no vault content (as deploy_edge.yml
# and beyond do not). Set ANSIBLE_VAULT_PASSWORD_FILE in your WSL/PC shell profile
# instead (see BOOTSTRAP.md § 1.9) — env-based, so it only applies where the file
# actually exists.
[defaults]
roles_path          = ./roles
collections_path    = ./collections
inventory           = ./inventories/prod.yml
stdout_callback       = default
result_format         = yaml
bin_ansible_callbacks = true
forks               = 5

[ssh_connection]
pipelining = true
ssh_args   = -o IdentitiesOnly=yes -o ControlMaster=auto -o ControlPath=/tmp/ansible-ssh-%h-%p-%r -o ControlPersist=60s