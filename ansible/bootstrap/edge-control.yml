---
- name: "Bootstrap | Edge | Project control"
  hosts: edge
  become: true

  vars:
    play_description: >
      Prepares the HomeLab project environment.
      Ensures repositories, scripts, and playbooks are available
      for further orchestration of this node or others.

  pre_tasks:
    - name: "Meta | Show play description"
      debug:
        msg: "{{ play_description }}"
      tags: [meta]

  roles:
    - role: control_node
      tags: [project, control]
      vars:
        role_description: "Prepare project structure and helper scripts"
