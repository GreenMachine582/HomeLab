---
- name: Bootstrap homelab-edge as Ansible control node
  hosts: edge
  become: true

  pre_tasks:
    - name: Update and upgrade system
      apt:
        update_cache: yes
        upgrade: dist

  roles:
    - base_hardening
    - homelab_user
    - ssh_access
    - github_repo_ssh
    - homelab_repos
    - docker
    - control_node
