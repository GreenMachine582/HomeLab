---
- name: Ensure UFW is installed
  apt:
    name: ufw
    state: present
  when: enable_ufw

- name: Disable IPv6 in UFW config
  lineinfile:
    path: /etc/default/ufw
    regexp: '^IPV6='
    line: 'IPV6=no'
  when: enable_ufw

- name: Reset UFW to defaults
  ufw:
    state: reset
  when: enable_ufw

- name: Set default deny incoming
  ufw:
    direction: incoming
    policy: deny
  when: enable_ufw

- name: Set default allow outgoing
  ufw:
    direction: outgoing
    policy: allow
  when: enable_ufw

- name: Allow loopback
  ufw:
    rule: allow
    interface: lo
    direction: in
  when: enable_ufw

- name: Allow SSH (rate limited)
  ufw:
    rule: limit
    port: 22
    proto: tcp
  when: enable_ufw

- name: Allow HTTP
  ufw:
    rule: allow
    port: 80
    proto: tcp
  when: enable_ufw

- name: Allow HTTPS
  ufw:
    rule: allow
    port: 443
    proto: tcp
  when: enable_ufw

- name: Allow DNS UDP
  ufw:
    rule: allow
    port: 53
    proto: udp
  when: enable_ufw

- name: Allow DNS TCP
  ufw:
    rule: allow
    port: 53
    proto: tcp
  when: enable_ufw

- name: Allow DHCP client
  ufw:
    rule: allow
    port: 67
    proto: udp
  when: enable_ufw

- name: Enable UFW
  ufw:
    state: enabled
  when: enable_ufw
