---
# =====================================================================
# Base Hardening | System Baseline & Security Controls
# =====================================================================

- name: "Base | Update apt cache"
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: "Base | Upgrade installed packages"
  apt:
    upgrade: dist
  tags: [packages]

# ---------------------------------------------------------------------
# Core utilities & security tooling
# ---------------------------------------------------------------------
- name: "Base | Install common and security packages"
  apt:
    name: "{{ common_packages + [
      'ca-certificates',
      'apt-transport-https',
      'gnupg',
      'lsb-release',
      'rsyslog',
      'logrotate',
      'auditd',
      'chrony'
    ] }}"
    state: present
  tags: [packages, security]

# ---------------------------------------------------------------------
# Time & clock consistency (critical for logs + auth)
# ---------------------------------------------------------------------
- name: "Base | Set system timezone"
  timezone:
    name: "{{ timezone }}"
  tags: [time]

- name: "Base | Enable and start time sync"
  systemd:
    name: chrony
    enabled: yes
    state: started
  tags: [time]

# ---------------------------------------------------------------------
# Unattended security updates
# ---------------------------------------------------------------------
- name: "Security | Enable unattended upgrades"
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    owner: root
    group: root
    mode: "0644"
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
  tags: [security, updates]

# ---------------------------------------------------------------------
# SSH hardening (safe defaults)
# ---------------------------------------------------------------------
- name: "Security | Harden SSH daemon configuration"
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
    backup: yes
  loop:
    - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin no' }
    - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication no' }
    - { regexp: '^#?ChallengeResponseAuthentication', line: 'ChallengeResponseAuthentication no' }
    - { regexp: '^#?UsePAM', line: 'UsePAM yes' }
    - { regexp: '^#?X11Forwarding', line: 'X11Forwarding no' }
    - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval 300' }
    - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax 2' }
  notify: Restart ssh
  tags: [security, ssh]

# ---------------------------------------------------------------------
# Kernel & network hardening (safe sysctls)
# ---------------------------------------------------------------------
- name: "Security | Apply kernel hardening sysctls"
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
  loop:
    - { name: net.ipv4.conf.all.accept_redirects, value: 0 }
    - { name: net.ipv4.conf.default.accept_redirects, value: 0 }
    - { name: net.ipv4.conf.all.send_redirects, value: 0 }
    - { name: net.ipv4.conf.default.send_redirects, value: 0 }
    - { name: net.ipv4.conf.all.accept_source_route, value: 0 }
    - { name: net.ipv4.conf.default.accept_source_route, value: 0 }
    - { name: net.ipv4.tcp_syncookies, value: 1 }
    - { name: net.ipv4.ip_forward, value: 0 }
  tags: [security, kernel]

# ---------------------------------------------------------------------
# Filesystem hardening
# ---------------------------------------------------------------------
- name: "Security | Ensure /tmp is mounted with safe options"
  mount:
    path: /tmp
    src: tmpfs
    fstype: tmpfs
    opts: rw,nosuid,nodev,noexec,relatime
    state: mounted
  tags: [security, filesystem]

# ---------------------------------------------------------------------
# Logging & auditing
# ---------------------------------------------------------------------
- name: "Security | Enable auditd"
  systemd:
    name: auditd
    enabled: yes
    state: started
  tags: [security, audit]

# ---------------------------------------------------------------------
# Final sanity check
# ---------------------------------------------------------------------
- name: "Meta | Base hardening complete"
  debug:
    msg: "Base system hardening applied successfully"
  tags: [meta]
