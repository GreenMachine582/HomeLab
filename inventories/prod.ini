# prod.ini
# Production inventory — used from homelab-edge for all Phase 2+ deployments.
# The homelab user (passwordless sudo) is used for all automation.
# NOTE: ansible_host values must be kept in sync with ip_* vars in
#       inventories/group_vars/all/main.yml — INI format does not support Jinja2.

# ── Edge ──────────────────────────────────────────────────────────────────────
[edge]
homelab-edge ansible_host=192.168.1.10

# ── Observability ─────────────────────────────────────────────────────────────
[observe]
homelab-observe ansible_host=192.168.1.11

# ── Service nodes ─────────────────────────────────────────────────────────────
[svc]
homelab-svc-01 ansible_host=192.168.1.20
# homelab-svc-02 ansible_host=192.168.1.21   # Uncomment when provisioned
# homelab-svc-03 ansible_host=192.168.1.22   # Uncomment when provisioned

# ── All nodes ─────────────────────────────────────────────────────────────────
[homelab:children]
edge
observe
svc

[homelab:vars]
ansible_user=homelab
ansible_ssh_private_key_file=~/.ssh/homelab
ansible_python_interpreter=/usr/bin/python3
# Keep in sync with ssh_port in group_vars/all/main.yml — INI cannot use Jinja2.
ansible_port=2189