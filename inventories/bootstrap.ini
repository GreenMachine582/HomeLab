# bootstrap.ini
# Phase 1 only — used from your PC to bootstrap homelab-edge from a fresh OS install.
# After bootstrap is complete, all subsequent deploys use prod.yml from the edge node.
# See BOOTSTRAP.md § 1.9 for setup instructions.

# NOTE: ansible_port defaults to 22 — correct for a fresh OS install.
# If re-running against an already-bootstrapped node, add: ansible_port=<ssh_port>
# ansible_host is required — DNS won't resolve before Pi-hole is running.
# Set to the Pi's current IP before each Phase 1 run. Do not commit the real IP.
# ansible_ssh_private_key_file assumes the repo is at ~/homelab in WSL (BOOTSTRAP.md § 1.2).
# If your repo is elsewhere update this path, or omit it if ssh-agent has the key loaded (step 1.7).
[edge_bootstrap]
homelab-edge ansible_host=EDIT_BEFORE_USE ansible_user=admin ansible_ssh_private_key_file=~/homelab/.ssh/homelab-edge

[edge_bootstrap:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_become_password={{ vault_admin_become_password }}