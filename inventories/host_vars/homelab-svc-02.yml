---
# host_vars/homelab-svc-02.yml
# Node-specific config for homelab-svc-02 (GreenTechHub).
# Status: Planned — uncomment in inventories/prod.yml when provisioned.
# Group-level config is in group_vars/svc.yml and group_vars/all.yml.

# ── Network ───────────────────────────────────────────────────────────────────
node_lan_ip: "{{ ip_svc_02 }}"
node_interface: eth0
node_hostname: homelab-svc-02

# ── Firewall (extends group_vars/svc.yml ufw_rules_base) ─────────────────────
ufw_rules_extra:
  - { port: 8000, proto: tcp, src: "{{ lan_subnet }}", comment: "GreenTechHub" }
  - { port: 5432, proto: tcp, src: "{{ lan_subnet }}", comment: "PostgreSQL (internal)" }
  - { port: 6379, proto: tcp, src: "{{ lan_subnet }}", comment: "Redis (internal)" }

# ── Storage ───────────────────────────────────────────────────────────────────
# SSD recommended. Update docker_data_dir if a dedicated mount is used.
docker_data_dir: /var/lib/docker

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres_port: 5432
postgres_data_dir: /var/lib/docker/volumes/postgres_data
postgres_backup_dir: /var/backups/postgres
postgres_shared_buffers: "256MB"
postgres_max_connections: 100

postgres_databases:
  - name: greentechhub
    user: "{{ vault_greentechhub_db_user }}"
    password: "{{ vault_greentechhub_db_password }}"

# ── Redis ─────────────────────────────────────────────────────────────────────
redis_port: 6379
redis_maxmemory: "256mb"
redis_maxmemory_policy: allkeys-lru

# ── GreenTechHub (Django) ─────────────────────────────────────────────────────
greentechhub_port: 8000
greentechhub_workers: 4             # Gunicorn worker count
greentechhub_image: "ghcr.io/{{ vault_github_org }}/greentechhub:latest"

greentechhub_env:
  DJANGO_SECRET_KEY: "{{ vault_django_secret_key }}"
  DJANGO_ALLOWED_HOSTS: "greentechhub.homelab.local,greentechhub.yourdomain.com"
  DJANGO_SETTINGS_MODULE: "config.settings.production"
  DATABASE_URL: "postgresql://{{ vault_greentechhub_db_user }}:{{ vault_greentechhub_db_password }}@postgres:5432/greentechhub"
  REDIS_URL: "redis://redis:6379/0"
  CELERY_BROKER_URL: "redis://redis:6379/1"

# ── Celery ────────────────────────────────────────────────────────────────────
celery_concurrency: 2
flower_port: 5555                   # Optional Celery monitoring UI