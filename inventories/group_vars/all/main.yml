---
# inventories/group_vars/all/main.yml
# Non-secret variables applied to every node.
# Secrets live alongside this file in vault.yml (Ansible Vault encrypted).
# Node-specific overrides live in host_vars/<node>.yml

# ── GitHub ────────────────────────────────────────────────────────────────────
# Org/username the homelab repo lives under — git@github.com:<github_org>/homelab.git.
# Not a secret (just identifies the repo to clone); overridden with the real
# value in overrides.yml — see CLAUDE.md "Secrets" for why this isn't in vault.yml.
github_org: "EDIT_BEFORE_USE"

# ── Network ───────────────────────────────────────────────────────────────────
lan_subnet: "EDIT_BEFORE_USE/24"

# Tailscale's stable CGNAT allocation (RFC 6598) — every tailnet device gets a
# 100.x.x.x address from this range. Used to scope UFW rules to "Tailscale only"
# without depending on each node's dynamic tailscale0 interface address.
tailscale_cgnat_range: "100.64.0.0/10"

ip_edge:    "EDIT_BEFORE_USE"
ip_observe: "EDIT_BEFORE_USE"
ip_svc_01:  "EDIT_BEFORE_USE"
ip_svc_02:  "EDIT_BEFORE_USE"
ip_svc_03:  "EDIT_BEFORE_USE"

tailscale_ip_edge:    "EDIT_BEFORE_USE"
tailscale_ip_observe: "EDIT_BEFORE_USE"
tailscale_ip_svc_01:  "EDIT_BEFORE_USE"
tailscale_ip_svc_02:  "EDIT_BEFORE_USE"
tailscale_ip_svc_03:  "EDIT_BEFORE_USE"

tailscale_tailnet: "EDIT_BEFORE_USE"   # short tailnet name, e.g. mango-beaver (Tailscale admin console → DNS)

# ── System ────────────────────────────────────────────────────────────────────
ssh_port: 22
fallback_ssh_port: 22
timezone: "Australia/Sydney"
locale: "en_AU.UTF-8"

ntp_servers:
  - 0.au.pool.ntp.org
  - 1.au.pool.ntp.org
  - 2.au.pool.ntp.org

# ── Users ─────────────────────────────────────────────────────────────────────
homelab_users:
  - name: admin
    groups: sudo
    shell: /bin/bash
    ssh_key: "{{ vault_admin_ssh_pubkey }}"
    sudo_passwordless: false

  - name: homelab
    groups: docker
    shell: /bin/bash
    ssh_key: "{{ vault_homelab_ssh_pubkey }}"
    sudo_passwordless: true

  - name: deploy
    groups: ""
    shell: /bin/bash
    ssh_key: "{{ vault_deploy_ssh_pubkey }}"
    sudo_passwordless: false
    sudo_commands:
      - "{{ homelab_repo_path }}/scripts/deploy.sh"

# ── SSH hardening ─────────────────────────────────────────────────────────────
ssh_permit_root_login: "no"
ssh_password_authentication: "no"
ssh_pubkey_authentication: "yes"
ssh_max_auth_tries: 3
ssh_client_alive_interval: 300
ssh_client_alive_count_max: 2

# ── Packages ──────────────────────────────────────────────────────────────────
base_packages:
  - curl
  - git
  - htop
  - vim
  - python3
  - python3-pip
  - unattended-upgrades
  - apt-transport-https
  - ca-certificates
  - gnupg
  - lsb-release

unattended_upgrades_enabled: true
unattended_upgrades_auto_reboot: false

# ── Docker ────────────────────────────────────────────────────────────────────
docker_data_dir: /var/lib/docker
docker_log_driver: json-file
docker_log_max_size: "10m"
docker_log_max_file: "3"

# ── Observability agents ──────────────────────────────────────────────────────
node_exporter_port: 9100
alloy_loki_endpoint: "http://{{ ip_observe }}:3100/loki/api/v1/push"

# ── Notifications ────────────────────────────────────────────────────────────
# Primary:  curl → self-hosted ntfy on homelab-observe
# Fallback: curl → Discord webhook (fires only if ntfy returns non-2xx or times out)
notify_script_dir: /usr/local/lib/homelab/notify
notify_ntfy_url: "http://{{ ip_observe }}:8085/homelab"
notify_ntfy_token: "{{ vault_ntfy_token }}"
notify_discord_webhook: "{{ vault_discord_alerts_webhook }}"

# ── Tailscale (common) ───────────────────────────────────────────────────────
# Auth keys are minted at deploy time via the OAuth client — no static key stored.

# ── Ansible repo path (on edge node) ─────────────────────────────────────────
homelab_repo_path: /opt/homelab
homelab_repo_url: "git@github.com:{{ github_org }}/homelab.git"
homelab_repo_branch: master